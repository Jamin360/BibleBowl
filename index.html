<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Bowl — ACE Regional 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9963A;
  --gold-light: #E8B85A;
  --gold-dim: rgba(201,150,58,0.15);
  --parchment: #F5EDD8;
  --ink: #12100A;
  --ink-mid: #2A1F0E;
  --ink-light: #3D2B12;
  --red: #8B2020;
  --green: #1A5C2A;
  --green-light: #3A8B50;
  --blue: #1A3A6C;
  --cream: rgba(245,237,216,0.85);
  --cream-dim: rgba(245,237,216,0.5);
  --cream-faint: rgba(245,237,216,0.07);
  --border: rgba(201,150,58,0.22);
  --border-hover: rgba(201,150,58,0.55);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'Crimson Pro',Georgia,serif;
  background:var(--ink);
  color:var(--parchment);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 10%,rgba(201,150,58,0.07) 0%,transparent 45%),
    radial-gradient(ellipse at 85% 90%,rgba(139,32,32,0.05) 0%,transparent 45%);
}

/* ── HEADER ── */
header{
  text-align:center;
  padding:2rem 1rem 0;
  position:relative;
}
.ornament{
  color:var(--gold);font-size:.7rem;letter-spacing:.6em;
  opacity:.55;margin-bottom:.6rem;display:block;
}
h1{
  font-family:'Cinzel',serif;font-weight:900;
  font-size:clamp(1.5rem,5vw,2.6rem);
  color:var(--gold-light);letter-spacing:.1em;
  text-shadow:0 2px 30px rgba(201,150,58,0.35);
  line-height:1.1;
}
.subtitle{
  font-size:.88rem;color:var(--cream-dim);
  margin:.35rem 0 0;font-style:italic;letter-spacing:.04em;
}

/* ── XP BAR ── */
.xp-bar-wrap{
  max-width:500px;margin:.9rem auto 0;
  display:flex;align-items:center;gap:.7rem;
  padding:0 1rem;
}
.xp-label{
  font-family:'Cinzel',serif;font-size:.65rem;
  letter-spacing:.12em;color:var(--gold);white-space:nowrap;
}
.xp-track{
  flex:1;height:3px;background:rgba(201,150,58,0.15);
  position:relative;border-radius:2px;overflow:hidden;
}
.xp-fill{
  height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));
  transition:width .6s ease;border-radius:2px;
}

/* ── NAV ── */
nav{
  display:flex;justify-content:center;gap:.4rem;
  padding:.9rem 1rem;flex-wrap:wrap;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;background:rgba(18,16,10,0.95);
  backdrop-filter:blur(8px);z-index:100;
}
.nav-btn{
  font-family:'Cinzel',serif;font-size:.68rem;
  letter-spacing:.1em;padding:.45rem 1rem;
  border:1px solid var(--border);background:transparent;
  color:rgba(201,150,58,0.65);cursor:pointer;
  transition:all .2s;text-transform:uppercase;
  white-space:nowrap;
}
.nav-btn:hover,.nav-btn.active{
  background:var(--gold);color:var(--ink);
  border-color:var(--gold);
}

main{max-width:900px;margin:0 auto;padding:1.5rem 1rem 4rem;}

/* ── SHARED ── */
.section-heading{
  font-family:'Cinzel',serif;font-size:.7rem;
  letter-spacing:.2em;color:var(--gold);
  opacity:.65;text-transform:uppercase;
  margin-bottom:.8rem;text-align:center;
}
.divider{
  width:50px;height:1px;
  background:rgba(201,150,58,0.3);
  margin:0 auto 1.4rem;
}
.fade-in{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── STUDY ── */
.progress-overview{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:.6rem;margin-bottom:1.5rem;
}
.prog-stat{
  background:var(--cream-faint);border:1px solid var(--border);
  padding:.8rem;text-align:center;
}
.prog-stat-num{
  font-family:'Cinzel',serif;font-size:1.5rem;
  color:var(--gold-light);line-height:1;
}
.prog-stat-label{
  font-size:.75rem;color:var(--cream-dim);
  margin-top:.2rem;font-style:italic;
}

.books-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:.9rem;
}
.book-card{
  background:var(--cream-faint);border:1px solid var(--border);
  cursor:pointer;transition:all .25s;position:relative;overflow:hidden;
}
.book-card::before{
  content:'';position:absolute;top:0;left:0;
  width:3px;height:100%;background:var(--gold);
  opacity:0;transition:opacity .25s;
}
.book-card:hover{background:rgba(245,237,216,0.1);border-color:var(--border-hover);}
.book-card:hover::before,.book-card.open::before{opacity:1;}
.book-card.open{border-color:var(--border-hover);}

.book-header{padding:1rem 1.2rem;}
.book-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;}
.book-name{
  font-family:'Cinzel',serif;font-size:.95rem;
  font-weight:600;color:var(--gold-light);line-height:1.2;
}
.book-status-btn{
  font-size:.6rem;font-family:'Cinzel',serif;
  letter-spacing:.08em;padding:.25rem .55rem;
  border:1px solid var(--border);background:transparent;
  color:var(--cream-dim);cursor:pointer;
  transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.book-status-btn.studied{border-color:#3A8B50;color:#8BD4A0;background:rgba(26,92,42,0.2);}
.book-status-btn.confident{border-color:var(--gold);color:var(--gold);background:rgba(201,150,58,0.15);}
.book-status-btn.review{border-color:#C97A3A;color:#E8A87A;background:rgba(139,80,32,0.2);}
.book-meta{font-size:.78rem;color:var(--cream-dim);margin-top:.2rem;font-style:italic;}
.book-chevron{font-size:.65rem;opacity:.5;transition:transform .25s;margin-top:.15rem;}
.book-card.open .book-chevron{transform:rotate(180deg);}

.book-detail{max-height:0;overflow:hidden;transition:max-height .45s ease;}
.book-card.open .book-detail{max-height:1200px;}
.book-detail-inner{
  padding:1rem 1.2rem 1.2rem;
  border-top:1px solid rgba(201,150,58,0.12);
}

/* Timeline bar */
.timeline-bar{
  margin-bottom:1rem;
  background:rgba(245,237,216,0.04);
  border:1px solid rgba(201,150,58,0.15);
  padding:.6rem .9rem;
}
.timeline-era{
  font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.15em;color:var(--gold);
  text-transform:uppercase;opacity:.75;
  margin-bottom:.2rem;
}
.timeline-context{font-size:.82rem;color:var(--cream-dim);line-height:1.45;}

.detail-tab-row{
  display:flex;gap:.4rem;margin-bottom:.9rem;flex-wrap:wrap;
}
.detail-tab{
  font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.1em;padding:.3rem .7rem;
  border:1px solid var(--border);background:transparent;
  color:rgba(201,150,58,0.6);cursor:pointer;
  transition:all .18s;text-transform:uppercase;
}
.detail-tab.active,.detail-tab:hover{
  background:var(--gold-dim);color:var(--gold);
  border-color:rgba(201,150,58,0.5);
}

.detail-panel{display:none;}
.detail-panel.active{display:block;animation:fadeIn .2s ease;}

.detail-label{
  font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.15em;color:var(--gold);
  text-transform:uppercase;opacity:.75;
  margin-bottom:.35rem;
}
.detail-text{font-size:.9rem;line-height:1.65;color:var(--cream);}

.key-facts{display:flex;flex-direction:column;gap:.3rem;}
.key-fact{
  font-size:.85rem;color:rgba(245,237,216,0.78);
  padding-left:1rem;position:relative;line-height:1.4;
}
.key-fact::before{content:'›';position:absolute;left:0;color:var(--gold);opacity:.7;}

.characters-list{display:flex;flex-direction:column;gap:.5rem;}
.character{
  display:flex;gap:.7rem;align-items:flex-start;
  padding:.5rem .7rem;
  background:rgba(245,237,216,0.03);
  border-left:2px solid rgba(201,150,58,0.25);
}
.char-name{
  font-family:'Cinzel',serif;font-size:.75rem;
  color:var(--gold-light);min-width:80px;
  font-weight:600;line-height:1.3;
}
.char-desc{font-size:.82rem;color:var(--cream-dim);line-height:1.4;}

.crossrefs{display:flex;flex-direction:column;gap:.5rem;}
.crossref{
  font-size:.85rem;color:var(--cream-dim);
  padding:.5rem .8rem;
  background:rgba(245,237,216,0.03);
  border:1px solid rgba(201,150,58,0.12);
  line-height:1.5;
}
.crossref strong{color:var(--gold-light);font-weight:600;}

.verses-list{display:flex;flex-direction:column;gap:.7rem;}
.verse{
  padding:.7rem .9rem;
  border-left:2px solid var(--gold);
  background:rgba(201,150,58,0.05);
}
.verse-ref{
  font-family:'Cinzel',serif;font-size:.65rem;
  letter-spacing:.12em;color:var(--gold);
  text-transform:uppercase;margin-bottom:.3rem;
}
.verse-text{font-size:.9rem;line-height:1.6;color:var(--cream);font-style:italic;}

/* ── FLASHCARDS ── */
.flashcard-wrap{
  max-width:520px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;gap:1.2rem;
}
.fc-progress{
  font-family:'Cinzel',serif;font-size:.7rem;
  letter-spacing:.12em;color:var(--cream-dim);
}
.fc-scene{
  width:100%;perspective:1000px;cursor:pointer;
  min-height:220px;
}
.fc-card{
  width:100%;min-height:220px;
  position:relative;transform-style:preserve-3d;
  transition:transform .5s cubic-bezier(.4,0,.2,1);
}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-front,.fc-back{
  position:absolute;width:100%;min-height:220px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:2rem;text-align:center;
  border:1px solid var(--border);
  background:rgba(245,237,216,0.04);
}
.fc-back{transform:rotateY(180deg);background:rgba(201,150,58,0.07);border-color:rgba(201,150,58,0.4);}
.fc-label{
  font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.2em;color:var(--gold);
  opacity:.65;text-transform:uppercase;margin-bottom:.8rem;
}
.fc-q{font-size:1.05rem;line-height:1.6;color:var(--parchment);}
.fc-a{font-size:1rem;line-height:1.6;color:var(--gold-light);}
.fc-hint{
  font-size:.75rem;color:var(--cream-dim);
  font-style:italic;margin-top:.6rem;
}
.fc-actions{display:flex;gap:.7rem;width:100%;}
.fc-btn{
  flex:1;font-family:'Cinzel',serif;font-size:.68rem;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.75rem;border:1px solid;cursor:pointer;
  transition:all .2s;
}
.fc-btn.know{
  border-color:#3A8B50;color:#8BD4A0;background:rgba(26,92,42,0.15);
}
.fc-btn.know:hover{background:rgba(26,92,42,0.35);}
.fc-btn.learn{
  border-color:#8B3A3A;color:#E08080;background:rgba(139,32,32,0.15);
}
.fc-btn.learn:hover{background:rgba(139,32,32,0.3);}
.fc-btn.skip{
  border-color:var(--border);color:var(--cream-dim);background:transparent;
}
.fc-btn.skip:hover{border-color:var(--border-hover);}
.fc-stats{
  display:flex;gap:1.5rem;font-family:'Cinzel',serif;
  font-size:.7rem;letter-spacing:.1em;
}
.fc-stat-know{color:#8BD4A0;}
.fc-stat-learn{color:#E08080;}
.fc-done{
  text-align:center;padding:2rem;
  background:var(--cream-faint);border:1px solid var(--border);
  width:100%;
}

/* ── GAME MODES ── */
.mode-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:1rem;margin-bottom:1.5rem;
}
.mode-card{
  background:var(--cream-faint);border:1px solid var(--border);
  padding:1.4rem;cursor:pointer;transition:all .25s;
  text-align:center;
}
.mode-card:hover{background:rgba(245,237,216,0.1);border-color:var(--border-hover);}
.mode-icon{font-size:2rem;margin-bottom:.6rem;}
.mode-title{
  font-family:'Cinzel',serif;font-size:.85rem;
  color:var(--gold-light);margin-bottom:.4rem;
}
.mode-desc{font-size:.8rem;color:var(--cream-dim);line-height:1.4;}

/* ── QUIZ ENGINE (speed / T-F / detective) ── */
.quiz-wrap{max-width:580px;margin:0 auto;}
.quiz-topbar{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem;
}
.badge{
  font-family:'Cinzel',serif;font-size:.7rem;
  letter-spacing:.1em;color:var(--gold);
  background:rgba(201,150,58,0.1);
  border:1px solid rgba(201,150,58,0.3);
  padding:.3rem .75rem;
}
.timer-bar-wrap{width:100%;height:3px;background:rgba(245,237,216,0.1);margin-bottom:1.5rem;}
.timer-bar{height:100%;background:var(--gold);transition:width .1s linear;}
.timer-bar.danger{background:#E05050;}

.q-card{
  background:var(--cream-faint);border:1px solid var(--border);
  padding:1.75rem;animation:fadeIn .3s ease;
}
.q-cat{
  font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.18em;color:var(--gold);
  opacity:.7;text-transform:uppercase;margin-bottom:.6rem;
}
.q-text{font-size:1.1rem;line-height:1.65;color:var(--parchment);margin-bottom:1.5rem;}
.options{display:flex;flex-direction:column;gap:.55rem;}
.opt-btn{
  text-align:left;padding:.75rem 1rem;
  border:1px solid rgba(245,237,216,0.14);
  background:rgba(245,237,216,0.03);
  color:rgba(245,237,216,0.82);
  font-family:'Crimson Pro',serif;font-size:.95rem;
  cursor:pointer;transition:all .18s;line-height:1.4;
}
.opt-btn:hover:not(:disabled){
  border-color:rgba(201,150,58,0.5);
  background:rgba(201,150,58,0.08);color:var(--parchment);
}
.opt-btn.correct{border-color:#3A8B50;background:rgba(26,92,42,0.25);color:#8BD4A0;}
.opt-btn.wrong{border-color:#8B2020;background:rgba(139,32,32,0.2);color:#E08080;}
.opt-btn:disabled{cursor:default;}

.tf-row{display:flex;gap:.8rem;}
.tf-btn{
  flex:1;padding:1.1rem;
  font-family:'Cinzel',serif;font-size:1.1rem;
  letter-spacing:.08em;border:1px solid var(--border);
  background:transparent;color:var(--parchment);
  cursor:pointer;transition:all .2s;
}
.tf-btn:hover:not(:disabled){background:var(--gold-dim);border-color:var(--gold);}
.tf-btn.correct{border-color:#3A8B50;background:rgba(26,92,42,0.25);color:#8BD4A0;}
.tf-btn.wrong{border-color:#8B2020;background:rgba(139,32,32,0.2);color:#E08080;}

.feedback-box{
  margin-top:1rem;padding:.9rem 1.1rem;
  font-size:.88rem;line-height:1.55;animation:fadeIn .2s ease;
}
.feedback-box.ok{border-left:3px solid #3A8B50;background:rgba(26,92,42,0.15);color:#A8DDB8;}
.feedback-box.no{border-left:3px solid var(--red);background:rgba(139,32,32,0.15);color:#E8B0B0;}

.next-btn{
  margin-top:1.2rem;width:100%;
  font-family:'Cinzel',serif;font-size:.75rem;
  letter-spacing:.15em;text-transform:uppercase;
  padding:.85rem;background:var(--gold);color:var(--ink);
  border:none;cursor:pointer;transition:background .2s;font-weight:600;
}
.next-btn:hover{background:var(--gold-light);}

/* Detective clues */
.clues{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1.3rem;}
.clue{
  padding:.6rem .9rem;
  background:rgba(245,237,216,0.04);
  border-left:2px solid rgba(201,150,58,0.3);
  font-size:.9rem;color:var(--cream-dim);
  animation:fadeIn .35s ease;
  line-height:1.45;
}
.clue-num{
  font-family:'Cinzel',serif;font-size:.6rem;
  letter-spacing:.12em;color:var(--gold);
  opacity:.65;display:block;margin-bottom:.15rem;
}

/* Results */
.results{text-align:center;padding:2.5rem 1rem;animation:fadeIn .4s ease;}
.results-score{
  font-family:'Cinzel',serif;
  font-size:clamp(2.5rem,10vw,4.5rem);
  color:var(--gold-light);font-weight:900;
  text-shadow:0 0 40px rgba(201,150,58,0.4);line-height:1;
}
.results-label{font-size:.9rem;color:var(--cream-dim);margin-top:.4rem;font-style:italic;}
.results-msg{
  margin:1.2rem auto;max-width:380px;
  font-size:1rem;line-height:1.65;color:var(--cream-dim);
}
.xp-gained{
  font-family:'Cinzel',serif;font-size:1.1rem;
  color:var(--gold);margin:.8rem 0;
}
.action-row{display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;margin-top:1.2rem;}
.action-btn{
  font-family:'Cinzel',serif;font-size:.7rem;
  letter-spacing:.12em;text-transform:uppercase;
  padding:.75rem 1.8rem;border:1px solid var(--gold);
  background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;
}
.action-btn:hover,.action-btn.primary{background:var(--gold);color:var(--ink);}
.action-btn.primary:hover{background:var(--gold-light);}

/* Progress page */
.prog-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.8rem;}
.prog-book{
  background:var(--cream-faint);border:1px solid var(--border);
  padding:.9rem 1.1rem;display:flex;
  justify-content:space-between;align-items:center;gap:.5rem;
}
.prog-book-name{
  font-family:'Cinzel',serif;font-size:.82rem;
  color:var(--gold-light);
}
.prog-book-status{
  font-size:.72rem;font-style:italic;
  color:var(--cream-dim);
}
.prog-book-status.studied{color:#8BD4A0;}
.prog-book-status.confident{color:var(--gold);}
.prog-book-status.review{color:#E8A87A;}

.ring-wrap{
  display:flex;justify-content:center;margin-bottom:1.5rem;
}
.ring-svg{overflow:visible;}
.ring-bg{fill:none;stroke:rgba(201,150,58,0.12);stroke-width:8;}
.ring-fg{
  fill:none;stroke:var(--gold);stroke-width:8;
  stroke-linecap:round;
  transform:rotate(-90deg);transform-origin:50% 50%;
  transition:stroke-dashoffset 1s ease;
}
.ring-text{
  font-family:'Cinzel',serif;font-size:18px;
  fill:var(--gold-light);text-anchor:middle;dominant-baseline:middle;
}
.ring-sub{
  font-family:'Crimson Pro',serif;font-size:10px;
  fill:var(--cream-dim);text-anchor:middle;dominant-baseline:middle;
  font-style:italic;
}

/* Misc */
.back-btn{
  font-family:'Cinzel',serif;font-size:.65rem;
  letter-spacing:.12em;text-transform:uppercase;
  padding:.4rem .9rem;border:1px solid var(--border);
  background:transparent;color:var(--cream-dim);
  cursor:pointer;transition:all .2s;margin-bottom:1.2rem;
  display:inline-block;
}
.back-btn:hover{border-color:var(--border-hover);color:var(--gold);}

.empty{
  text-align:center;padding:3rem 1rem;
  color:var(--cream-dim);font-style:italic;font-size:.95rem;
}
</style>
</head>
<body>

<header>
  <span class="ornament">✦ ✦ ✦</span>
  <h1>BIBLE BOWL</h1>
  <div class="subtitle">ACE Regional Convention · Study Guide v2</div>
  <div class="xp-bar-wrap">
    <span class="xp-label" id="xpLabel">0 XP</span>
    <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <span class="xp-label" id="xpLevel">Lv 1</span>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showView('study')">Study</button>
  <button class="nav-btn" onclick="showView('flashcards')">Flashcards</button>
  <button class="nav-btn" onclick="showView('games')">Games</button>
  <button class="nav-btn" onclick="showView('progress')">Progress</button>
</nav>

<main id="app"></main>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const BOOKS = [
  {
    id:'deuteronomy',name:'Deuteronomy',
    testament:'Old Testament · Pentateuch',
    author:'Moses',chapters:34,
    era:'Wilderness Period',
    timelineContext:'Written c. 1406 BC, at the end of Israel\'s 40 years in the wilderness. Israel stands on the east bank of the Jordan, poised to enter Canaan. Moses is 120 years old.',
    summary:'Moses\' farewell speeches to Israel before entering Canaan. He restates the Law, rehearses Israel\'s history, and calls the nation to covenant faithfulness. Ends with Moses\' death on Mount Nebo.',
    keyFacts:[

    const parts = f.split('—');
    if(parts.length>1) FLASHCARDS.push({q:`Complete: "${parts[0].trim()} — ___"`, a:parts[1].trim(), book:b.name});
  });
  b.verses.slice(0,1).forEach(v=>{
    FLASHCARDS.push({q:`What book and chapter contains: "${v.text.substring(0,60)}..."`, a:v.ref, book:b.name});
  });
});

// STATE
// ═══════════════════════════════════════════════
let currentView = 'study';
let openCard = null;
let cardTabs = {}; // bookId -> active tab
let bookStatus = {}; // bookId -> '' | 'studied' | 'confident' | 'review'
let xp = 0;

// Flashcard state
let fcDeck = [];
let fcIndex = 0;
let fcKnow = 0;
let fcLearn = 0;
let fcFlipped = false;

// Game state
let gameMode = null; // null = picker, 'speed','tf','detective'
let gameQuestions = [];
let gameIndex = 0;
let gameScore = 0;
let gameAnswered = false;
let gameSelectedOpt = null;
let timerInterval = null;
let timerLeft = 10;
let detectiveClueIndex = 0;
let detectiveCase = null;

// Load from localStorage
try {
  const saved = JSON.parse(localStorage.getItem('bibleBowlV2')||'{}');
  bookStatus = saved.bookStatus || {};
  xp = saved.xp || 0;
} catch(e){}

function save() {
  try { localStorage.setItem('bibleBowlV2', JSON.stringify({bookStatus, xp})); } catch(e){}
}

function addXP(amount) {
  xp += amount;
  save();
  updateXPBar();
}

function updateXPBar() {
  const lvl = Math.floor(xp / 100) + 1;
  const pct = (xp % 100);
  document.getElementById('xpLabel').textContent = `${xp} XP`;
  document.getElementById('xpLevel').textContent = `Lv ${lvl}`;
  document.getElementById('xpFill').style.width = pct + '%';
}

// ═══════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════
function showView(v) {
  currentView = v;
  clearGameTimer();
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', b.textContent.toLowerCase().includes(v) || (v==='games' && b.textContent==='Games'));
  });
  render();
}

// ═══════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  if (currentView==='study') app.innerHTML = renderStudy();
  else if (currentView==='flashcards') app.innerHTML = renderFlashcards();
  else if (currentView==='games') app.innerHTML = renderGames();
  else if (currentView==='progress') app.innerHTML = renderProgress();
  updateXPBar();
}

// STUDY VIEW
// ═══════════════════════════════════════════════
function renderStudy() {
  const total = BOOKS.length;
  const studied = BOOKS.filter(b=>bookStatus[b.id]).length;
  const confident = BOOKS.filter(b=>bookStatus[b.id]==='confident').length;
  const needReview = BOOKS.filter(b=>bookStatus[b.id]==='review').length;

  return `
    <p class="section-heading">11 Books — Click to Explore</p>
    <div class="divider"></div>
    <div class="progress-overview">
      <div class="prog-stat">
        <div class="prog-stat-num">${studied}/${total}</div>
        <div class="prog-stat-label">Opened</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-num">${confident}</div>
        <div class="prog-stat-label">Confident</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-num">${needReview}</div>
        <div class="prog-stat-label">Need Review</div>
      </div>
    </div>
    <div class="books-grid">
      ${BOOKS.map(b => renderBookCard(b)).join('')}
    </div>
  `;
}

function renderBookCard(b) {
  const open = openCard === b.id;
  const status = bookStatus[b.id] || '';
  const activeTab = cardTabs[b.id] || 'overview';
  const statusLabels = {'':"Mark Status",'studied':'✓ Studied','confident':'★ Confident','review':'⚠ Review'};

  return `
    <div class="book-card ${open?'open':''}" id="card-${b.id}">
      <div class="book-header" onclick="toggleCard('${b.id}')">
        <div class="book-top">
          <div>
            <div class="book-name">${b.name}</div>
            <div class="book-meta">${b.testament} · ${b.chapters} chapters</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.3rem">
            <span class="book-chevron">▼</span>
          </div>
        </div>
      </div>
      ${open ? `
      <div class="book-detail">
        <div class="book-detail-inner">
          <div class="timeline-bar">
            <div class="timeline-era">${b.era}</div>
            <div class="timeline-context">${b.timelineContext}</div>
          </div>
          <div style="display:flex;gap:.4rem;margin-bottom:.9rem;flex-wrap:wrap;align-items:center">
            <button class="book-status-btn ${status}" onclick="event.stopPropagation();cycleStatus('${b.id}')">${statusLabels[status]}</button>
          </div>
          <div class="detail-tab-row">
            ${['overview','facts','characters','connections','verses'].map(tab=>`
              <button class="detail-tab ${activeTab===tab?'active':''}" onclick="event.stopPropagation();setTab('${b.id}','${tab}')">${tab.charAt(0).toUpperCase()+tab.slice(1)}</button>
            `).join('')}
          </div>
          ${activeTab==='overview'?`
            <div class="detail-panel active">
              <div class="detail-label">Author</div>
              <div class="detail-text" style="margin-bottom:.8rem">${b.author}</div>
              <div class="detail-label">Summary</div>
              <div class="detail-text">${b.summary}</div>
            </div>
          `:activeTab==='facts'?`
            <div class="detail-panel active">
              <div class="detail-label">Key Facts</div>
              <div class="key-facts">${b.keyFacts.map(f=>`<div class="key-fact">${f}</div>`).join('')}</div>
            </div>
          `:activeTab==='characters'?`
            <div class="detail-panel active">
              <div class="detail-label">Key Characters</div>
              <div class="characters-list">${b.characters.map(c=>`
                <div class="character">
                  <div class="char-name">${c.name}</div>
                  <div class="char-desc">${c.desc}</div>
                </div>
              `).join('')}</div>
            </div>
          `:activeTab==='connections'?`
            <div class="detail-panel active">
              <div class="detail-label">Cross-References &amp; Connections</div>
              <div class="crossrefs">${b.crossrefs.map(r=>`
                <div class="crossref">${r.text}${r.link?` <strong>${r.link}</strong>`:''}</div>
              `).join('')}</div>
            </div>
          `:activeTab==='verses'?`
            <div class="detail-panel active">
              <div class="detail-label">Verse Spotlight</div>
              <div class="verses-list">${b.verses.map(v=>`
                <div class="verse">
                  <div class="verse-ref">${v.ref}</div>
                  <div class="verse-text">${v.text}</div>
                </div>
              `).join('')}</div>
            </div>
          `:''}
        </div>
      </div>
      ` : ''}
    </div>
  `;
}

function toggleCard(id) {
  openCard = openCard===id ? null : id;
  render();
  if (openCard) setTimeout(()=>{ const el=document.getElementById('card-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'}); },50);
}

function setTab(id, tab) {
  cardTabs[id] = tab;
  render();
}

function cycleStatus(id) {
  const cycle = ['','studied','confident','review'];
  const cur = cycle.indexOf(bookStatus[id]||'');
  bookStatus[id] = cycle[(cur+1)%cycle.length];
  if (bookStatus[id]==='confident') addXP(10);
  else if (bookStatus[id]==='studied') addXP(5);
  save();
  render();
}

// ═══════════════════════════════════════════════
// FLASHCARDS
// ═══════════════════════════════════════════════
function startFlashcards() {
  fcDeck = [...FLASHCARDS].sort(()=>Math.random()-.5);
  fcIndex = 0; fcKnow = 0; fcLearn = 0; fcFlipped = false;
  render();
}

function renderFlashcards() {
  if (!fcDeck.length) {
    return `
      <p class="section-heading">Flashcards</p>
      <div class="divider"></div>
      <div class="flashcard-wrap">
        <div class="empty" style="padding:1.5rem 0">
          ${FLASHCARDS.length} cards covering all 11 books — authors, eras, key facts, and verse references.
        </div>
        <button class="next-btn" style="max-width:400px" onclick="startFlashcards()">Start Flashcards</button>
      </div>
    `;
  }

  if (fcIndex >= fcDeck.length) {
    const pct = Math.round(fcKnow/fcDeck.length*100);
    return `
      <div class="flashcard-wrap fade-in">
        <div class="fc-done">
          <div class="prog-stat-num" style="font-size:2.5rem;color:var(--gold-light)">${fcKnow}/${fcDeck.length}</div>
          <div class="prog-stat-label" style="margin-top:.4rem">Cards you knew · ${pct}%</div>
          <div style="margin-top:.8rem;font-size:.85rem;color:var(--cream-dim);font-style:italic">
            ${pct>=80?'Outstanding! You\'re ready for competition.':pct>=60?'Good progress. Review the ones you marked.':'Keep going — repetition builds confidence.'}
          </div>
        </div>
        <div class="fc-actions" style="max-width:400px">
          <button class="fc-btn know" onclick="startFlashcards()">Restart</button>
          <button class="fc-btn skip" onclick="fcDeck=[];render()">Exit</button>
        </div>
      </div>
    `;
  }

  const card = fcDeck[fcIndex];
  return `
    <p class="section-heading">Flashcards</p>
    <div class="divider"></div>
    <div class="flashcard-wrap">
      <div class="fc-progress">${fcIndex+1} of ${fcDeck.length} · <span style="color:#8BD4A0">✓${fcKnow}</span> · <span style="color:#E08080">✗${fcLearn}</span></div>
      <div class="fc-scene" onclick="flipCard()">
        <div class="fc-card ${fcFlipped?'flipped':''}" id="fcCard">
          <div class="fc-front">
            <div class="fc-label">${card.book}</div>
            <div class="fc-q">${card.q}</div>
            <div class="fc-hint">Tap to reveal</div>
          </div>
          <div class="fc-back">
            <div class="fc-label">Answer</div>
            <div class="fc-a">${card.a}</div>
          </div>
        </div>
      </div>
      ${fcFlipped?`
        <div class="fc-actions" style="max-width:440px;width:100%">
          <button class="fc-btn know" onclick="fcAnswer(true)">✓ Know it</button>
          <button class="fc-btn learn" onclick="fcAnswer(false)">✗ Still learning</button>
          <button class="fc-btn skip" onclick="fcAnswer(null)">Skip</button>
        </div>
      `:`<div style="height:52px"></div>`}
      <div class="fc-stats">
        <span class="fc-stat-know">✓ Know: ${fcKnow}</span>
        <span class="fc-stat-learn">✗ Learning: ${fcLearn}</span>
      </div>
    </div>
  `;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  render();
}

function fcAnswer(knew) {
  if (knew===true) { fcKnow++; addXP(3); }
  else if (knew===false) { fcLearn++; }
  fcIndex++;
  fcFlipped = false;
  render();
}

  gameMode = 'speed';
  gameQuestions = [...ALL_QUESTIONS].sort(()=>Math.random()-.5).slice(0,10);
  gameIndex = 0; gameScore = 0; gameAnswered = false; gameSelectedOpt = null;
  render();
  startTimer(10);
}

function renderSpeedRound() {
  if (gameIndex >= gameQuestions.length) return renderGameResults('speed');
  const q = gameQuestions[gameIndex];
  const pct = (timerLeft/10)*100;
  const danger = timerLeft <= 3;
  return `
    <button class="back-btn" onclick="endGame()">← Back</button>
    <div class="quiz-wrap fade-in">
      <div class="quiz-topbar">
        <span class="badge">⚡ Speed Round</span>
        <span class="badge">Score: ${gameScore}/${gameIndex}</span>
        <span class="badge">Q ${gameIndex+1}/10</span>
        <span class="badge ${danger?'':''}">⏱ ${timerLeft}s</span>
      </div>
      <div class="timer-bar-wrap">
        <div class="timer-bar ${danger?'danger':''}" style="width:${pct}%"></div>
      </div>
      <div class="q-card">
        <div class="q-cat">${q.cat} · ${q.book}</div>
        <div class="q-text">${q.q}</div>
        <div class="options">
          ${q.opts.map((opt,oi)=>`
            <button class="opt-btn ${gameAnswered?(opt===q.a?'correct':opt===gameSelectedOpt?'wrong':''):''}"
              onclick="${gameAnswered?'':'speedAnswer('+oi+')'}"
              ${gameAnswered?'disabled':''}>
              ${opt}
            </button>
          `).join('')}
        </div>
        ${gameAnswered?`
          <div class="feedback-box ${gameSelectedOpt===q.a?'ok':'no'}">
            ${gameSelectedOpt===q.a?'✓ Correct! ':'✗ '+q.a+'. '}${q.exp}
          </div>
          <button class="next-btn" onclick="speedNext()">${gameIndex+1<gameQuestions.length?'Next →':'See Results'}</button>
        `:''}
      </div>
    </div>
  `;
}

function speedAnswer(oi) {
  clearGameTimer();
  gameAnswered = true;
  const opt = gameQuestions[gameIndex].opts[oi];
  gameSelectedOpt = opt;
  if (opt === gameQuestions[gameIndex].a) { gameScore++; addXP(5); }
  render();
}

function speedNext() {
  gameIndex++;
  gameAnswered = false;
  gameSelectedOpt = null;
  if (gameIndex < gameQuestions.length) { render(); startTimer(10); }
  else render();
}

function startTimer(secs) {
  clearGameTimer();
  timerLeft = secs;
  render();
  timerInterval = setInterval(()=>{
    timerLeft--;
    const bar = document.querySelector('.timer-bar');
    const badge = document.querySelector('.badge:last-child');
    if (bar) { bar.style.width = (timerLeft/secs*100)+'%'; if(timerLeft<=3) bar.classList.add('danger'); }
    if (badge) { badge.textContent = '⏱ '+timerLeft+'s'; if(timerLeft<=3) badge.style.color='#E05050'; }
    if (timerLeft <= 0) {
      clearGameTimer();
      gameAnswered = true;
      gameSelectedOpt = null;
      render();
    }
  }, 1000);
}

function clearGameTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── TRUE / FALSE ──
function startTF() {
  clearGameTimer();
  gameMode = 'tf';
  gameQuestions = [...TF_QUESTIONS].sort(()=>Math.random()-.5);
  gameIndex = 0; gameScore = 0; gameAnswered = false; gameSelectedOpt = null;
  render();
}

function renderTrueFalse() {
  if (gameIndex >= gameQuestions.length) return renderGameResults('tf');
  const q = gameQuestions[gameIndex];
  const userAns = gameSelectedOpt; // true | false | null
  return `
    <button class="back-btn" onclick="endGame()">← Back</button>
    <div class="quiz-wrap fade-in">
      <div class="quiz-topbar">
        <span class="badge">⚖️ True or False</span>
        <span class="badge">Score: ${gameScore}/${gameIndex}</span>
        <span class="badge">Q ${gameIndex+1}/${gameQuestions.length}</span>
      </div>
      <div class="q-card">
        <div class="q-cat">${q.book}</div>
        <div class="q-text">${q.q}</div>
        <div class="tf-row">
          <button class="tf-btn ${gameAnswered?(q.a===true?'correct':(userAns===true?'wrong':'')):''}"
            onclick="${gameAnswered?'':'tfAnswer(true)'}" ${gameAnswered?'disabled':''}>
            TRUE
          </button>
          <button class="tf-btn ${gameAnswered?(q.a===false?'correct':userAns===false?'wrong':''):''}"
            onclick="${gameAnswered?'':'tfAnswer(false)'}" ${gameAnswered?'disabled':''}>
            FALSE
          </button>
        </div>
        ${gameAnswered?`
          <div class="feedback-box ${userAns===q.a?'ok':'no'}">
            ${userAns===q.a?'✓ Correct! ':'✗ The answer is '+String(q.a).toUpperCase()+'. '}${q.exp}
          </div>
          <button class="next-btn" onclick="tfNext()">${gameIndex+1<gameQuestions.length?'Next →':'See Results'}</button>
        `:''}
      </div>
    </div>
  `;
}

function tfAnswer(val) {
  gameAnswered = true;
  gameSelectedOpt = val;
  if (val === gameQuestions[gameIndex].a) { gameScore++; addXP(4); }
  render();
}

function tfNext() {
  gameIndex++;
  gameAnswered = false;
  gameSelectedOpt = null;
  render();
}

// ── BOOK DETECTIVE ──
function startDetective() {
  clearGameTimer();
  gameMode = 'detective';
  gameQuestions = [...DETECTIVE_CASES].sort(()=>Math.random()-.5);
  gameIndex = 0; gameScore = 0; gameAnswered = false; gameSelectedOpt = null;
  detectiveClueIndex = 0;
  render();
}

function renderDetective() {
  if (gameIndex >= gameQuestions.length) return renderGameResults('detective');
  const c = gameQuestions[gameIndex];
  const cluesShown = detectiveClueIndex+1;
  const bookNames = BOOKS.map(b=>b.name);

  return `
    <button class="back-btn" onclick="endGame()">← Back</button>
    <div class="quiz-wrap fade-in">
      <div class="quiz-topbar">
        <span class="badge">🔍 Book Detective</span>
        <span class="badge">Score: ${gameScore}/${gameIndex}</span>
        <span class="badge">Case ${gameIndex+1}/${gameQuestions.length}</span>
      </div>
      <div class="q-card">
        <div class="q-cat">Clues revealed: ${cluesShown}/3</div>
        <div class="q-text">Which book am I?</div>
        <div class="clues">
          ${c.clues.slice(0,cluesShown).map((cl,i)=>`
            <div class="clue">
              <span class="clue-num">Clue ${i+1}</span>
              ${cl}
            </div>
          `).join('')}
        </div>
        ${!gameAnswered?`
          ${detectiveClueIndex<2?`<button class="next-btn" style="background:transparent;border:1px solid var(--gold);color:var(--gold);margin-bottom:.6rem" onclick="detectiveNextClue()">Reveal Next Clue</button>`:''}
          <div class="options">
            ${bookNames.map((n,ni)=>`
              <button class="opt-btn" onclick="detectiveAnswer(${ni})">${n}</button>
            `).join('')}
          </div>
        `:`
          <div class="options">
            ${bookNames.map(n=>`
              <button class="opt-btn ${n===c.book?'correct':n===gameSelectedOpt?'wrong':''}" disabled>${n}</button>
            `).join('')}
          </div>
          <div class="feedback-box ${gameSelectedOpt===c.book?'ok':'no'}">
            ${gameSelectedOpt===c.book?'✓ Correct! ':'✗ It was '+c.book+'. '}
            ${gameSelectedOpt===c.book?'Well done, detective.':'Review the clues and remember this one.'}
          </div>
          <button class="next-btn" onclick="detectiveNext()">${gameIndex+1<gameQuestions.length?'Next Case →':'See Results'}</button>
        `}
      </div>
    </div>
  `;
}

function detectiveNextClue() {
  if (detectiveClueIndex < 2) { detectiveClueIndex++; render(); }
}

function detectiveAnswer(ni) {
  const name = BOOKS.map(b=>b.name)[ni];
  gameAnswered = true;
  gameSelectedOpt = name;
  const correct = name === gameQuestions[gameIndex].book;
  // More points for fewer clues used
  if (correct) { 
    const pts = detectiveClueIndex===0?15:detectiveClueIndex===1?10:7;
    addXP(pts); gameScore++; 
  }
  render();
}

function detectiveNext() {
  gameIndex++;
  gameAnswered = false;
  gameSelectedOpt = null;
  detectiveClueIndex = 0;
  render();
}

// ── GAME RESULTS ──
function renderGameResults(mode) {
  const total = gameQuestions.length;
  const pct = Math.round(gameScore/total*100);
  const modeNames = {speed:'Speed Round',tf:'True or False',detective:'Book Detective'};
  const msg = pct===100?'Perfect! You crushed it.':pct>=80?'Excellent work — nearly flawless.':pct>=60?'Solid effort. A bit more review and you\'ll own it.':'Keep studying — you\'re building the foundation.';
  return `
    <div class="results">
      <div style="font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.2em;color:var(--gold);opacity:.6;margin-bottom:.5rem">${modeNames[mode]}</div>
      <div class="results-score">${gameScore}/${total}</div>
      <div class="results-label">${pct}% Correct</div>
      <div class="xp-gained">+${gameScore*(mode==='speed'?5:mode==='tf'?4:8)} XP earned</div>
      <div class="results-msg">${msg}</div>
      <div class="action-row">
        <button class="action-btn primary" onclick="${mode==='speed'?'startSpeed()':mode==='tf'?'startTF()':'startDetective()'}">Play Again</button>
        <button class="action-btn" onclick="endGame()">Other Games</button>
        <button class="action-btn" onclick="showView('study')">Study</button>
      </div>
    </div>
  `;
}

function endGame() {
  clearGameTimer();
  gameMode = null;
  gameQuestions = [];
  gameIndex = 0;
  render();
}

// ═══════════════════════════════════════════════
// PROGRESS VIEW
// ═══════════════════════════════════════════════
function renderProgress() {
  const total = BOOKS.length;
  const confident = BOOKS.filter(b=>bookStatus[b.id]==='confident').length;
  const studied = BOOKS.filter(b=>bookStatus[b.id]==='studied').length;
  const review = BOOKS.filter(b=>bookStatus[b.id]==='review').length;
  const opened = BOOKS.filter(b=>bookStatus[b.id]).length;
  const pct = Math.round(confident/total*100);
  const r = 54; const circ = 2*Math.PI*r;
  const offset = circ - (confident/total)*circ;
  const lvl = Math.floor(xp/100)+1;

  return `
    <p class="section-heading">Your Progress</p>
    <div class="divider"></div>
    <div class="ring-wrap">
      <svg class="ring-svg" width="140" height="140" viewBox="0 0 140 140">
        <circle class="ring-bg" cx="70" cy="70" r="${r}"/>
        <circle class="ring-fg" cx="70" cy="70" r="${r}"
          stroke-dasharray="${circ}"
          stroke-dashoffset="${offset}"/>
        <text class="ring-text" x="70" y="65">${pct}%</text>
        <text class="ring-sub" x="70" y="82">confident</text>
      </svg>
    </div>
    <div class="progress-overview" style="margin-bottom:1.5rem">
      <div class="prog-stat">
        <div class="prog-stat-num" style="color:var(--gold-light)">Lv ${lvl}</div>
        <div class="prog-stat-label">${xp} Total XP</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-num" style="color:#8BD4A0">${confident}</div>
        <div class="prog-stat-label">Confident</div>
      </div>
      <div class="prog-stat">
        <div class="prog-stat-num" style="color:#E8A87A">${review}</div>
        <div class="prog-stat-label">Need Review</div>
      </div>
    </div>
    <div class="prog-grid">
      ${BOOKS.map(b=>{
        const s = bookStatus[b.id]||'';
        const labels = {'':'Not started','studied':'Studied','confident':'Confident','review':'Needs Review'};
        return `
          <div class="prog-book">
            <div>
              <div class="prog-book-name">${b.name}</div>
              <div class="prog-book-status ${s}">${labels[s]}</div>
            </div>
            <button class="book-status-btn ${s}" onclick="cycleStatusProgress('${b.id}')" style="font-size:.55rem">
              ${s===''?'+':s==='studied'?'★':s==='confident'?'⚠':'✓'}
            </button>
          </div>
        `;
      }).join('')}
    </div>
    <div style="margin-top:1.5rem;text-align:center">
      <button class="action-btn" onclick="if(confirm('Reset all progress?')){bookStatus={};xp=0;save();render()}">Reset Progress</button>
    </div>
  `;
}

function cycleStatusProgress(id) {
  cycleStatus(id);
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
render();
</script>
</body>
</html>
