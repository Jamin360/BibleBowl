<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Bowl — ACE Regional 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D4A843;
  --gold-light: #ECC96A;
  --gold-dim: rgba(212,168,67,0.12);
  --gold-glow: rgba(212,168,67,0.25);
  --ink: #0E0C08;
  --ink2: #1A1710;
  --ink3: #252118;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(212,168,67,0.18);
  --border2: rgba(212,168,67,0.4);
  --text: #F0E6CC;
  --text-dim: rgba(240,230,204,0.55);
  --text-faint: rgba(240,230,204,0.3);
  --green: #4CAF7D;
  --green-bg: rgba(76,175,125,0.15);
  --red: #E05555;
  --red-bg: rgba(224,85,85,0.15);
  --r: 10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Lora',Georgia,serif;background:var(--ink);color:var(--text);min-height:100vh;overflow-x:hidden;}

.app-header{padding:1.25rem 1.5rem 0;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;}
.wordmark{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1rem,3vw,1.4rem);color:var(--gold-light);letter-spacing:.12em;text-shadow:0 0 30px var(--gold-glow);}
.wordmark span{color:var(--text-dim);font-weight:400;font-size:.75em;letter-spacing:.06em;}
.xp-pill{display:flex;align-items:center;gap:.6rem;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:.3rem .8rem .3rem .6rem;}
.xp-info{display:flex;flex-direction:column;}
.xp-num{font-family:'Cinzel',serif;font-size:.68rem;color:var(--gold);letter-spacing:.05em;line-height:1;}
.xp-sub{font-size:.58rem;color:var(--text-faint);line-height:1;margin-top:1px;}
.xp-mini-bar{width:55px;height:2px;background:rgba(212,168,67,0.15);border-radius:2px;overflow:hidden;}
.xp-mini-fill{height:100%;background:var(--gold);transition:width .5s ease;}

nav{display:flex;gap:.3rem;padding:.8rem 1.5rem;position:sticky;top:0;z-index:100;background:rgba(14,12,8,0.93);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
.nav-btn{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;padding:.5rem 1rem;border-radius:100px;border:1px solid transparent;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;text-transform:uppercase;white-space:nowrap;display:flex;align-items:center;gap:.35rem;}
.nav-btn .ni{font-size:.82rem;}
.nav-btn:hover{background:var(--surface2);color:var(--text);}
.nav-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600;}

main{max-width:920px;margin:0 auto;padding:1.4rem 1.5rem 5rem;}

/* Study */
.study-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;margin-bottom:1.3rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.9rem;text-align:center;}
.stat-num{font-family:'Cinzel',serif;font-size:1.7rem;color:var(--gold-light);line-height:1;}
.stat-label{font-size:.72rem;color:var(--text-dim);margin-top:.2rem;}

.books-list{display:flex;flex-direction:column;gap:.45rem;}
.book-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:border-color .2s;}
.book-row:hover,.book-row.open{border-color:var(--border2);}
.book-row-header{display:flex;align-items:center;gap:.7rem;padding:.85rem 1.1rem;cursor:pointer;user-select:none;}
.book-row-left{display:flex;align-items:center;gap:.7rem;flex:1;min-width:0;}
.book-status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.15);transition:all .2s;}
.book-status-dot.studied{background:var(--green);border-color:var(--green);}
.book-status-dot.confident{background:var(--gold);border-color:var(--gold);box-shadow:0 0 5px var(--gold-glow);}
.book-status-dot.review{background:#E08C55;border-color:#E08C55;}
.book-row-name{font-family:'Cinzel',serif;font-size:.88rem;color:var(--gold-light);font-weight:600;}
.book-row-meta{font-size:.72rem;color:var(--text-faint);}
.book-row-right{display:flex;align-items:center;gap:.55rem;flex-shrink:0;}
.status-btn{font-size:.62rem;font-family:'Cinzel',serif;letter-spacing:.05em;padding:.22rem .6rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap;}
.status-btn:hover{border-color:var(--border2);color:var(--text);}
.status-btn.studied{border-color:rgba(76,175,125,0.5);color:var(--green);background:rgba(76,175,125,0.08);}
.status-btn.confident{border-color:var(--gold);color:var(--gold);background:var(--gold-dim);}
.status-btn.review{border-color:rgba(224,140,85,0.5);color:#E08C55;background:rgba(224,140,85,0.08);}
.book-chev{color:var(--text-faint);font-size:.68rem;transition:transform .25s;}
.book-row.open .book-chev{transform:rotate(180deg);}
.book-detail-wrap{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(0.4,0,0.2,1);}
.book-row.open .book-detail-wrap{max-height:1400px;}
.book-detail-body{padding:0 1.1rem 1.2rem;border-top:1px solid var(--border);padding-top:1rem;}
.timeline-chip{display:inline-flex;align-items:center;gap:.4rem;background:var(--gold-dim);border:1px solid rgba(212,168,67,0.25);border-radius:100px;padding:.28rem .75rem;font-size:.7rem;color:var(--gold);margin-bottom:.85rem;}
.detail-tabs{display:flex;gap:.3rem;margin-bottom:.9rem;overflow-x:auto;padding-bottom:.2rem;scrollbar-width:none;}
.detail-tabs::-webkit-scrollbar{display:none;}
.dtab{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.08em;padding:.32rem .75rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .18s;text-transform:uppercase;white-space:nowrap;}
.dtab:hover{background:var(--surface2);color:var(--text);}
.dtab.active{background:var(--ink3);border-color:var(--border2);color:var(--gold);}
.dpanel{display:none;animation:fadeUp .2s ease;}
.dpanel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.dlabel{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;opacity:.7;margin-bottom:.45rem;}
.dtext{font-size:.88rem;line-height:1.7;color:rgba(240,230,204,0.8);}
.facts-list{display:flex;flex-direction:column;gap:.3rem;}
.fact-item{display:flex;gap:.55rem;font-size:.83rem;color:var(--text-dim);line-height:1.45;padding:.1rem 0;}
.fact-item::before{content:'›';color:var(--gold);opacity:.6;flex-shrink:0;}
.chars-grid{display:flex;flex-direction:column;gap:.45rem;}
.char-item{display:grid;grid-template-columns:95px 1fr;gap:.65rem;padding:.55rem .75rem;background:var(--surface);border-radius:8px;border-left:2px solid var(--border2);}
.char-name{font-family:'Cinzel',serif;font-size:.72rem;color:var(--gold-light);font-weight:600;line-height:1.3;}
.char-desc{font-size:.8rem;color:var(--text-dim);line-height:1.45;}
.crossrefs-list{display:flex;flex-direction:column;gap:.45rem;}
.xref-item{font-size:.83rem;color:var(--text-dim);padding:.55rem .85rem;background:var(--surface);border-radius:8px;line-height:1.55;}
.xref-item strong{color:var(--gold-light);}
.verses-list{display:flex;flex-direction:column;gap:.7rem;}
.verse-item{padding:.75rem .95rem;border-left:2px solid var(--gold);background:var(--gold-dim);border-radius:0 8px 8px 0;}
.verse-ref{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;margin-bottom:.3rem;}
.verse-text{font-size:.88rem;line-height:1.65;color:var(--text);font-style:italic;}

/* Flashcards */
.fc-shell{max-width:500px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:.9rem;}
.fc-topbar{width:100%;display:flex;justify-content:space-between;align-items:center;}
.fc-counter{font-size:.8rem;color:var(--text-dim);}
.fc-scores{display:flex;gap:.75rem;font-size:.8rem;}
.fc-know{color:var(--green);}
.fc-learn{color:var(--red);}
.fc-prog-bar{width:100%;height:2px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.fc-prog-fill{height:100%;background:var(--gold);transition:width .3s ease;}
.fc-scene{width:100%;perspective:1200px;cursor:pointer;}
.fc-card{width:100%;min-height:190px;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(0.4,0,0.2,1);}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;width:100%;min-height:190px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:1.75rem 1.5rem;text-align:center;border:1px solid var(--border);}
.fc-front{background:var(--surface);}
.fc-back{transform:rotateY(180deg);background:var(--ink3);border-color:var(--border2);}
.fc-face-label{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;color:var(--gold);opacity:.65;text-transform:uppercase;margin-bottom:.7rem;}
.fc-q{font-size:.97rem;line-height:1.65;color:var(--text);}
.fc-a{font-size:.97rem;line-height:1.6;color:var(--gold-light);font-weight:600;}
.fc-tap-hint{font-size:.7rem;color:var(--text-faint);font-style:italic;margin-top:.65rem;}
.fc-btns{display:flex;gap:.55rem;width:100%;}
.fc-action{flex:1;padding:.7rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid;cursor:pointer;transition:all .2s;}
.fc-action.know{border-color:rgba(76,175,125,0.5);color:var(--green);background:var(--green-bg);}
.fc-action.know:hover{background:rgba(76,175,125,0.25);}
.fc-action.learn{border-color:rgba(224,85,85,0.5);color:var(--red);background:var(--red-bg);}
.fc-action.learn:hover{background:rgba(224,85,85,0.25);}
.fc-action.skip{border-color:var(--border);color:var(--text-dim);background:transparent;}
.fc-action.skip:hover{border-color:var(--border2);}
.fc-done-card{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:2.25rem;text-align:center;}
.fc-done-score{font-family:'Cinzel',serif;font-size:2.8rem;color:var(--gold-light);line-height:1;}
.fc-done-label{font-size:.82rem;color:var(--text-dim);margin-top:.3rem;font-style:italic;}
.fc-done-msg{font-size:.88rem;color:var(--text-dim);margin-top:.9rem;line-height:1.6;}

/* Games */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:.7rem;margin-bottom:1.3rem;}
.game-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem 1.2rem;cursor:pointer;transition:all .25s;text-align:center;position:relative;overflow:hidden;}
.game-card::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,var(--gold-glow),transparent 65%);opacity:0;transition:opacity .3s;}
.game-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.game-card:hover::before{opacity:1;}
.game-icon{font-size:2rem;margin-bottom:.65rem;}
.game-title{font-family:'Cinzel',serif;font-size:.85rem;color:var(--gold-light);margin-bottom:.35rem;}
.game-desc{font-size:.75rem;color:var(--text-dim);line-height:1.45;}

/* Quiz engine */
.quiz-shell{max-width:560px;margin:0 auto;}
.back-row{margin-bottom:1.1rem;}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;font-family:'Cinzel',serif;font-size:.63rem;letter-spacing:.1em;text-transform:uppercase;padding:.38rem .85rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s;}
.back-btn:hover{border-color:var(--border2);color:var(--text);}
.quiz-topbar{display:flex;align-items:center;gap:.45rem;margin-bottom:.9rem;flex-wrap:wrap;}
.badge{font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.08em;padding:.28rem .7rem;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--gold);}
.badge.timer.danger{color:var(--red);border-color:rgba(224,85,85,0.4);}
.timer-track{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-bottom:1.1rem;}
.timer-fill{height:100%;background:var(--gold);transition:width .1s linear;border-radius:2px;}
.timer-fill.danger{background:var(--red);}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;animation:fadeUp .25s ease;}
.q-badge{display:inline-block;font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.12em;color:var(--gold);text-transform:uppercase;opacity:.65;margin-bottom:.6rem;}
.q-text{font-size:1.02rem;line-height:1.7;color:var(--text);margin-bottom:1.1rem;}
.opts{display:flex;flex-direction:column;gap:.4rem;}
.opt{padding:.7rem .95rem;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.03);color:rgba(240,230,204,0.8);font-family:'Lora',serif;font-size:.9rem;cursor:pointer;transition:all .18s;text-align:left;line-height:1.4;}
.opt:hover:not(:disabled){border-color:var(--border2);background:var(--gold-dim);color:var(--text);}
.opt.correct{border-color:rgba(76,175,125,0.6);background:var(--green-bg);color:var(--green);}
.opt.wrong{border-color:rgba(224,85,85,0.6);background:var(--red-bg);color:var(--red);}
.opt:disabled{cursor:default;}
.tf-row{display:flex;gap:.55rem;}
.tf-btn{flex:1;padding:1rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.95rem;letter-spacing:.08em;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.03);color:var(--text);cursor:pointer;transition:all .2s;}
.tf-btn:hover:not(:disabled){background:var(--gold-dim);border-color:var(--border2);}
.tf-btn.correct{border-color:rgba(76,175,125,0.6);background:var(--green-bg);color:var(--green);}
.tf-btn.wrong{border-color:rgba(224,85,85,0.6);background:var(--red-bg);color:var(--red);}
.feedback{margin-top:.85rem;padding:.8rem .95rem;border-radius:8px;font-size:.85rem;line-height:1.55;animation:fadeUp .2s ease;}
.feedback.ok{background:var(--green-bg);border:1px solid rgba(76,175,125,0.3);color:#A8DDB8;}
.feedback.no{background:var(--red-bg);border:1px solid rgba(224,85,85,0.3);color:#F0B8B8;}
.next-btn{width:100%;margin-top:.9rem;padding:.82rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;background:var(--gold);color:var(--ink);border:none;cursor:pointer;transition:background .2s;font-weight:600;}
.next-btn:hover{background:var(--gold-light);}
.clues-list{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.clue-item{padding:.6rem .85rem;border-radius:8px;background:var(--surface);border-left:2px solid var(--border2);font-size:.85rem;color:var(--text-dim);line-height:1.5;animation:fadeUp .3s ease;}
.clue-num{font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.12em;color:var(--gold);opacity:.65;display:block;margin-bottom:.18rem;}
.reveal-btn{width:100%;margin-bottom:.55rem;padding:.72rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;background:transparent;border:1px solid var(--border2);color:var(--gold);cursor:pointer;transition:all .2s;}
.reveal-btn:hover{background:var(--gold-dim);}

/* Results */
.results{text-align:center;padding:2.25rem 1rem;animation:fadeUp .4s ease;max-width:440px;margin:0 auto;}
.result-score{font-family:'Cinzel',serif;font-size:clamp(2.8rem,12vw,4.5rem);color:var(--gold-light);font-weight:900;text-shadow:0 0 50px var(--gold-glow);line-height:1;}
.result-label{font-size:.88rem;color:var(--text-dim);margin-top:.35rem;font-style:italic;}
.result-xp{font-family:'Cinzel',serif;font-size:.95rem;color:var(--gold);margin:.9rem 0 .4rem;}
.result-msg{font-size:.92rem;color:var(--text-dim);line-height:1.65;margin-bottom:1.4rem;}
.result-actions{display:flex;gap:.55rem;justify-content:center;flex-wrap:wrap;}
.result-btn{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;padding:.7rem 1.5rem;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--gold);cursor:pointer;transition:all .2s;}
.result-btn:hover,.result-btn.primary{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.result-btn.primary:hover{background:var(--gold-light);}

/* Progress */
.prog-hero{display:flex;align-items:center;gap:1.3rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.2rem 1.4rem;margin-bottom:.9rem;flex-wrap:wrap;}
.ring-bg-c{fill:none;stroke:rgba(212,168,67,0.1);stroke-width:7;}
.ring-fg-c{fill:none;stroke:var(--gold);stroke-width:7;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1);}
.ring-txt{font-family:'Cinzel',serif;fill:var(--gold-light);text-anchor:middle;dominant-baseline:middle;}
.ring-sub-txt{font-family:'Lora',serif;fill:var(--text-faint);text-anchor:middle;dominant-baseline:middle;font-style:italic;}
.prog-hero-stats{flex:1;display:flex;flex-direction:column;gap:.55rem;}
.prog-hero-row{display:flex;justify-content:space-between;align-items:center;}
.prog-hero-label{font-size:.8rem;color:var(--text-dim);}
.prog-hero-val{font-family:'Cinzel',serif;font-size:.82rem;}
.prog-hero-val.green{color:var(--green);}
.prog-hero-val.gold{color:var(--gold);}
.prog-hero-val.orange{color:#E08C55;}
.prog-books-list{display:flex;flex-direction:column;gap:.38rem;}
.prog-book-row{display:flex;align-items:center;gap:.7rem;padding:.65rem .85rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;}
.prog-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,0.1);}
.prog-dot.studied{background:var(--green);}
.prog-dot.confident{background:var(--gold);box-shadow:0 0 4px var(--gold-glow);}
.prog-dot.review{background:#E08C55;}
.prog-book-name{font-family:'Cinzel',serif;font-size:.78rem;color:var(--text);flex:1;}
.prog-book-status{font-size:.7rem;color:var(--text-faint);font-style:italic;}
.prog-book-status.studied{color:var(--green);}
.prog-book-status.confident{color:var(--gold);}
.prog-book-status.review{color:#E08C55;}
.prog-cycle-btn{font-size:.6rem;font-family:'Cinzel',serif;padding:.22rem .6rem;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .18s;}
.prog-cycle-btn:hover{border-color:var(--border2);color:var(--gold);}
.reset-btn{display:block;margin:1.1rem auto 0;font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:.45rem 1.1rem;border-radius:100px;border:1px solid rgba(224,85,85,0.3);background:transparent;color:rgba(224,85,85,0.55);cursor:pointer;transition:all .2s;}
.reset-btn:hover{background:var(--red-bg);color:var(--red);border-color:rgba(224,85,85,0.5);}

.sec-head{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;opacity:.6;text-align:center;margin-bottom:1rem;}
.start-screen{display:flex;flex-direction:column;align-items:center;gap:.7rem;padding:1.4rem 0;}
.start-label{font-size:.83rem;color:var(--text-dim);text-align:center;}
.start-btn{width:100%;max-width:360px;padding:.85rem;border-radius:8px;font-family:'Cinzel',serif;font-size:.78rem;letter-spacing:.12em;text-transform:uppercase;background:var(--gold);color:var(--ink);border:none;cursor:pointer;transition:background .2s;font-weight:600;}
.start-btn:hover{background:var(--gold-light);}
.fade-up{animation:fadeUp .3s ease;}
</style>
</head>
<body>

<div class="app-header">
  <div class="wordmark">BIBLE BOWL <span>ACE Regional 2026</span></div>
  <div class="xp-pill">
    <div class="xp-info">
      <span class="xp-num" id="xpNum">0 XP</span>
      <span class="xp-sub" id="xpLvl">Level 1</span>
    </div>
    <div class="xp-mini-bar"><div class="xp-mini-fill" id="xpFill" style="width:0%"></div></div>
  </div>
</div>

<nav>
  <button class="nav-btn active" onclick="showView('study')"><span class="ni">📖</span>Study</button>

<script>
const BOOKS=[
  {id:'deuteronomy',name:'Deuteronomy',testament:'Old Testament · Pentateuch',author:'Moses',chapters:34,era:'Wilderness Period · c. 1406 BC',timelineContext:'Israel stands on the east bank of the Jordan, 40 years of wilderness behind them. Moses, 120 years old, delivers his farewell speeches before his death on Mount Nebo.',summary:'Moses\' final three speeches to Israel before entering Canaan. He restates the Law, rehearses the wilderness journey, and calls the nation to covenant faithfulness. Ends with Moses\' death.',keyFacts:['Name means "Second Law" — a restatement of the Mosaic Law','Contains the Shema (6:4–5), the central confession of Judaism','Moses dies at the end, buried by God; location unknown','Joshua appointed as Moses\' successor','Key theme: obedience brings blessing, disobedience brings curse'],characters:[{name:'Moses',desc:'Author and central figure. Delivers all three farewell addresses. Dies at age 120.'},{name:'Joshua',desc:'Appointed by God as Moses\' successor to lead Israel into Canaan.'},{name:'The LORD',desc:'Reaffirms His covenant promises to Abraham, Isaac, and Jacob.'}],crossrefs:[{text:'The Shema (6:4–5) is quoted by Jesus as the greatest commandment in Matthew 22:37.'},{text:'Moses\' death sets up Joshua, which begins with God commissioning Joshua directly.'},{text:'Paul quotes Deuteronomy extensively in Romans and Galatians arguing about Law vs. grace.'}],verses:[{ref:'Deuteronomy 6:4–5',text:'Hear, O Israel: The LORD our God, the LORD is one. Love the LORD your God with all your heart and with all your soul and with all your strength.'},{ref:'Deuteronomy 30:19',text:'I have set before you life and death, blessings and curses. Now choose life, so that you and your children may live.'},{ref:'Deuteronomy 31:6',text:'Be strong and courageous. Do not be afraid or terrified... for the LORD your God goes with you.'}]},
  {id:'nehemiah',name:'Nehemiah',testament:'Old Testament · History',author:'Nehemiah (with Ezra)',chapters:13,era:'Post-Exilic Period · c. 445 BC',timelineContext:'The Jews have returned from Babylonian exile. Jerusalem is repopulated but its walls lie in ruins. Nehemiah serves in the Persian court of King Artaxerxes I.',summary:'Nehemiah, cupbearer to King Artaxerxes, hears of Jerusalem\'s broken walls, prays, and receives royal permission to return and rebuild. Despite fierce opposition the walls are completed in 52 days. Ezra reads the Law publicly and the people renew their covenant.',keyFacts:['Nehemiah was cupbearer to King Artaxerxes — a position of great trust','Walls rebuilt in just 52 days (Neh. 6:15)','Main opponents: Sanballat, Tobiah, and Geshem the Arab','Ezra reads the Law publicly to the people (ch. 8)','Workers built with one hand and held a weapon with the other (4:17)'],characters:[{name:'Nehemiah',desc:'Cupbearer turned governor. A man of prayer, courage, and practical leadership.'},{name:'Artaxerxes I',desc:'Persian king who grants Nehemiah permission and supplies to rebuild Jerusalem.'},{name:'Sanballat',desc:'Horonite official who mocked and plotted against the wall rebuilding.'},{name:'Ezra',desc:'Priest and scribe who publicly reads the Law of Moses to the returned exiles.'}],crossrefs:[{text:'Nehemiah continues the story begun in Ezra — both cover the post-exilic restoration under Persia.'},{text:'The wall completion sets context for Malachi, written around the same era to address spiritual apathy.'},{text:'Nehemiah\'s prayer in ch. 1 echoes the covenant warnings of Deuteronomy 28–30.'}],verses:[{ref:'Nehemiah 1:3–4',text:'Those who survived the exile are in great trouble and disgrace. The wall of Jerusalem is broken down... When I heard these things, I sat down and wept.'},{ref:'Nehemiah 4:6',text:'So we rebuilt the wall till all of it reached half its height, for the people worked with all their heart.'},{ref:'Nehemiah 6:15–16',text:'So the wall was completed... in fifty-two days. When all our enemies heard about this... they realized that this work had been done with the help of our God.'}]},
  {id:'song',name:'Song of Solomon',testament:'Old Testament · Poetry',author:'Solomon',chapters:8,era:'United Kingdom · c. 950 BC',timelineContext:'Written during Solomon\'s reign at the height of Israel\'s golden age. It stands alongside Proverbs and Ecclesiastes as part of the Solomonic wisdom tradition.',summary:'A lyrical poem celebrating love and marriage between the Shulamite bride and her beloved. Rich in nature imagery. Often read allegorically as God\'s love for Israel or Christ\'s love for the Church.',keyFacts:['Also called "Song of Songs" — Hebrew superlative for the greatest song','Three voices: the bride (Shulamite), the bridegroom, and a chorus','"I am my beloved\'s and my beloved is mine" (6:3)','Set in spring — filled with vineyards, flowers, and nature imagery','Traditionally read at Passover in Jewish liturgy'],characters:[{name:'The Bride',desc:'The Shulamite woman. Primary speaker, expressing love and longing.'},{name:'The Beloved',desc:'The bridegroom, identified with Solomon, who praises the bride\'s beauty.'},{name:'Daughters of Jerusalem',desc:'A chorus who respond to the bride\'s words and ask questions.'}],crossrefs:[{text:'Paul uses marriage as a metaphor for Christ and the Church in Ephesians 5:25–32, echoing this book.'},{text:'Revelation\'s imagery of the Bride of Christ draws on the wedding imagery of this book.'},{text:'The book stands alongside Psalms and Proverbs in the Hebrew poetry section (Ketuvim).'}],verses:[{ref:'Song of Solomon 1:2',text:'Let him kiss me with the kisses of his mouth — for your love is more delightful than wine.'},{ref:'Song of Solomon 6:3',text:'I am my beloved\'s and my beloved is mine; he browses among the lilies.'},{ref:'Song of Solomon 8:6–7',text:'Love is as strong as death... It burns like blazing fire... Many waters cannot quench love; rivers cannot wash it away.'}]},
  {id:'chronicles',name:'I Chronicles',testament:'Old Testament · History',author:'Traditionally Ezra',chapters:29,era:'Post-Exilic Writing · covers c. 1010–970 BC',timelineContext:'Written c. 450–400 BC by Ezra for the returned exiles. The content covers David\'s reign. Written to give the post-exilic community spiritual identity as they rebuild.',summary:'A retelling of Israel\'s history from Adam to David, written for the post-exilic community. Chapters 1–9 are genealogies; the rest focuses on David\'s reign and preparations for the Temple. David\'s sin with Bathsheba is notably omitted.',keyFacts:['Likely compiled by Ezra for the returned exiles','Opens with nine chapters of genealogies (Adam to the tribes)','Focuses on David\'s role in planning and preparing for the Temple','Omits David\'s sin with Bathsheba — emphasizes his godly legacy','Ends with David charging Solomon and his death'],characters:[{name:'David',desc:'Central figure. A man after God\'s heart who prepares everything for the Temple.'},{name:'Solomon',desc:'Named as David\'s successor and the one who will actually build the Temple.'},{name:'Nathan',desc:'Prophet who delivers the Davidic Covenant to David in chapter 17.'}],crossrefs:[{text:'Chronicles parallels Samuel and Kings but with a priestly perspective — emphasizing worship over politics.'},{text:'The Davidic Covenant in ch. 17 is fulfilled ultimately in Jesus Christ, the Son of David.'},{text:'David\'s worship preparations foreshadow the Temple worship in II Chronicles and heaven in Revelation.'}],verses:[{ref:'I Chronicles 16:11',text:'Look to the LORD and his strength; seek his face always.'},{ref:'I Chronicles 17:11–12',text:'When your days are over... I will raise up your offspring... He is the one who will build a house for me, and I will establish his throne forever.'},{ref:'I Chronicles 29:14',text:'But who am I, and who are my people, that we should be able to give as generously as this? Everything comes from you, and we have given you only what comes from your hand.'}]},
  {id:'malachi',name:'Malachi',testament:'Old Testament · Minor Prophets',author:'Malachi',chapters:4,era:'Post-Exilic Period · c. 430 BC',timelineContext:'About 100 years after the first return from exile. The Temple is rebuilt, but the people are spiritually apathetic. Priests are corrupt, divorce is rampant, and tithes are neglected.',summary:'The final book of the Old Testament. Malachi rebukes corrupt priests, unfaithful marriages, and robbing God in tithes. Written as disputations. Ends with the promise that Elijah will come before the Day of the Lord — 400 years of silence follow.',keyFacts:['Last book of the Old Testament — closes the OT prophetic canon','Name means "my messenger"','Written as disputations: God charges, Israel disputes, God responds','"Will a man rob God? ...in tithes and offerings" (3:8)','Promises "Elijah" before the Day of the Lord — fulfilled in John the Baptist'],characters:[{name:'Malachi',desc:'Last of the OT prophets. Challenges a complacent, corrupt post-exilic community.'},{name:'The Priests',desc:'Rebuked for offering blemished sacrifices and despising God\'s name.'},{name:'Elijah (promised)',desc:'A future figure who will turn hearts before the Day of the Lord — John the Baptist.'}],crossrefs:[{text:'Jesus identifies John the Baptist as the promised "Elijah" of Malachi 4:5 in Matthew 11:14.'},{text:'The 400 years of silence between Malachi and Matthew make the opening of the Gospels dramatic.'},{text:'Malachi\'s tithing challenge (3:10) is frequently cited in NT discussions of generosity.'}],verses:[{ref:'Malachi 3:8',text:'Will a man rob God? Yet you rob me. But you ask, "How do we rob you?" In tithes and offerings.'},{ref:'Malachi 3:10',text:'"Bring the whole tithe into the storehouse... Test me in this," says the LORD Almighty, "and see if I will not throw open the floodgates of heaven."'},{ref:'Malachi 4:5–6',text:'See, I will send you the prophet Elijah before that great and dreadful day of the LORD comes. He will turn the hearts of the fathers to their children.'}]},
  {id:'isaiah',name:'Isaiah',testament:'Old Testament · Major Prophets',author:'Isaiah',chapters:66,era:'Pre-Exilic · c. 740–700 BC',timelineContext:'The Assyrian Empire is expanding rapidly. Isaiah prophesied during the reigns of Uzziah, Jotham, Ahaz, and Hezekiah, speaking to both his immediate crisis and 700 years ahead to the Messiah.',summary:'Called the "Fifth Gospel" for its Messianic prophecies. Two major sections: Judgment (chs. 1–39) and Comfort/Hope (chs. 40–66). Contains the Servant Songs — the most precise OT prophecies about Jesus, especially chapter 53.',keyFacts:['Called the "Fifth Gospel" — most quoted OT book in the NT','Prophesied during four Judean kings: Uzziah, Jotham, Ahaz, Hezekiah','Ch. 6 — calling vision: "Here am I, send me"','Ch. 53 — Suffering Servant — wounded for our transgressions','"They that wait upon the LORD shall renew their strength" (40:31)'],characters:[{name:'Isaiah',desc:'Prophet to Judah. Called in a dramatic throne-room vision (ch. 6). Married with children.'},{name:'Hezekiah',desc:'Godly king who prays and sees miraculous deliverance from Assyria (chs. 36–39).'},{name:'Cyrus (named)',desc:'Named 150 years before his birth as the Persian king who would free the exiles (44:28).'}],crossrefs:[{text:'Isaiah 53 is quoted or alluded to over 40 times in the NT. The Ethiopian eunuch is reading it in Acts 8.'},{text:'Isaiah 40:3 ("A voice crying in the wilderness") is quoted in all four Gospels about John the Baptist.'},{text:'Isaiah 7:14 ("The virgin shall conceive") is quoted in Matthew 1:23 as fulfilled in Jesus\' birth.'}],verses:[{ref:'Isaiah 6:8',text:'Then I heard the voice of the Lord saying, "Whom shall I send? And who will go for us?" And I said, "Here am I. Send me!"'},{ref:'Isaiah 40:31',text:'But those who hope in the LORD will renew their strength. They will soar on wings like eagles; they will run and not grow weary, they will walk and not be faint.'},{ref:'Isaiah 53:5',text:'But he was pierced for our transgressions, he was crushed for our iniquities; the punishment that brought us peace was on him, and by his wounds we are healed.'}]},
  {id:'acts',name:'Acts',testament:'New Testament · History',author:'Luke',chapters:28,era:'Apostolic Period · c. AD 62–63',timelineContext:'Covers events from Jesus\' ascension (c. AD 30) to Paul\'s Roman imprisonment (c. AD 62). Christianity spreads from a Jewish sect in Jerusalem to a movement reaching the imperial capital.',summary:'The history of the early Church from the ascension of Jesus to Paul\'s imprisonment in Rome. Covers Pentecost, the spread of the Gospel outward, and Paul\'s three missionary journeys. Peter dominates the first half; Paul the second.',keyFacts:['Written by Luke as a sequel to his Gospel — both addressed to Theophilus','Pentecost (ch. 2): Holy Spirit falls, Peter preaches, 3,000 saved','Paul\'s conversion on the Damascus road is in Acts 9','Three missionary journeys of Paul detailed in Acts','Key verse: Acts 1:8 — "witnesses... to the ends of the earth"'],characters:[{name:'Peter',desc:'Lead apostle in chs. 1–12. Preaches at Pentecost. Opens the gospel to Gentiles in ch. 10.'},{name:'Paul',desc:'Former persecutor converted on the Damascus road. Dominates chs. 13–28.'},{name:'Stephen',desc:'First Christian martyr. His stoning (ch. 7) scatters the church and spreads the gospel.'},{name:'Barnabas',desc:'Encourager who vouches for Paul and joins him on the first missionary journey.'}],crossrefs:[{text:'Acts picks up exactly where Luke\'s Gospel ends — the ascension is described in both Luke 24 and Acts 1.'},{text:'Paul\'s letters (Romans, Corinthians, Galatians) make far more sense read alongside the Acts timeline.'},{text:'Acts 15 (the Jerusalem Council) resolves the Gentile question Paul argues theologically in Galatians.'}],verses:[{ref:'Acts 1:8',text:'But you will receive power when the Holy Spirit comes on you; and you will be my witnesses in Jerusalem, and in all Judea and Samaria, and to the ends of the earth.'},{ref:'Acts 2:42',text:'They devoted themselves to the apostles\' teaching and to fellowship, to the breaking of bread and to prayer.'},{ref:'Acts 4:12',text:'Salvation is found in no one else, for there is no other name under heaven given to mankind by which we must be saved.'}]},
  {id:'2corinthians',name:'II Corinthians',testament:'New Testament · Epistle',author:'Paul',chapters:13,era:'Apostolic Period · c. AD 55–57',timelineContext:'Written from Macedonia during Paul\'s third missionary journey. Paul had sent a painful letter to Corinth (now lost); this letter responds after Titus brought good news of partial reconciliation.',summary:'Paul\'s most personal and autobiographical letter. A defense of his apostleship, an appeal for reconciliation, and a theology of suffering and ministry. Contains the thorn in the flesh, the cheerful giver passage, and a vision of the third heaven.',keyFacts:['Most autobiographical and emotionally intense of Paul\'s letters','"My grace is sufficient for you, for my power is made perfect in weakness" (12:9)','"God loves a cheerful giver" (9:7)','Paul describes being caught up to the third heaven (ch. 12)','Ends with the Trinitarian benediction (13:14)'],characters:[{name:'Paul',desc:'Author and apostle. Defends his calling while being vulnerable about weakness and suffering.'},{name:'Titus',desc:'Paul\'s trusted co-worker who brings good news from Corinth that prompts this letter.'},{name:'The Super-Apostles',desc:'False teachers who boasted in credentials and attacked Paul\'s apostolic authority.'}],crossrefs:[{text:'II Corinthians follows I Corinthians and a tearful letter (now lost) in Paul\'s Corinthian correspondence.'},{text:'The new creation theology (5:17) is foundational to Paul\'s arguments in Galatians and Ephesians.'},{text:'The thorn in the flesh (12:7–10) echoes Paul\'s teaching on weakness in Romans 8.'}],verses:[{ref:'II Corinthians 5:17',text:'Therefore, if anyone is in Christ, the new creation has come: the old has gone, the new is here!'},{ref:'II Corinthians 9:7',text:'Each of you should give what you have decided in your heart to give, not reluctantly or under compulsion, for God loves a cheerful giver.'},{ref:'II Corinthians 12:9',text:'"My grace is sufficient for you, for my power is made perfect in weakness." Therefore I will boast all the more gladly about my weaknesses, so that Christ\'s power may rest on me.'}]},
  {id:'1timothy',name:'I Timothy',testament:'New Testament · Pastoral Epistle',author:'Paul',chapters:6,era:'Apostolic Period · c. AD 62–64',timelineContext:'Likely written after Paul\'s first Roman imprisonment. Timothy is pastoring in Ephesus — a large cosmopolitan city famous for its temple to Artemis.',summary:'Paul\'s letter to his young protégé Timothy, pastoring in Ephesus. Covers how to handle false teachers, church worship and order, qualifications for elders and deacons, and how Timothy should conduct himself as a young minister.',keyFacts:['One of three Pastoral Epistles (I Tim, II Tim, Titus)','Timothy is pastoring the church at Ephesus','Ch. 3 lists qualifications for elders (overseers) and deacons','"The love of money is a root of all kinds of evil" (6:10)','"Fight the good fight of faith" (6:12)'],characters:[{name:'Timothy',desc:'Paul\'s young protégé. Part-Jewish, part-Greek. Pastoring the challenging church at Ephesus.'},{name:'Paul',desc:'Writes as a spiritual father giving pastoral instruction to his son in the faith.'},{name:'Hymenaeus and Alexander',desc:'False teachers who have shipwrecked their faith and been handed over to Satan (1:20).'}],crossrefs:[{text:'I Timothy\'s church order instructions closely parallel those in Titus, the third Pastoral Epistle.'},{text:'Timothy\'s Ephesus ministry is referenced in Acts 19–20 and Paul\'s farewell to the Ephesian elders.'},{text:'The trustworthy sayings formula in I Timothy (1:15, 3:1, 4:9) is unique to the Pastoral Epistles.'}],verses:[{ref:'I Timothy 1:15',text:'Here is a trustworthy saying that deserves full acceptance: Christ Jesus came into the world to save sinners — of whom I am the worst.'},{ref:'I Timothy 6:6',text:'But godliness with contentment is great gain.'},{ref:'I Timothy 6:12',text:'Fight the good fight of the faith. Take hold of the eternal life to which you were called when you made your good confession.'}]},
  {id:'2peter',name:'II Peter',testament:'New Testament · General Epistle',author:'Peter',chapters:3,era:'Apostolic Period · c. AD 65–68',timelineContext:'Written shortly before Peter\'s martyrdom under Nero. The church faces intense persecution and corruption from false teachers who deny the Second Coming.',summary:'Peter\'s final letter, written in the shadow of his death. He urges believers to grow in grace, warns against false teachers, and defends the truth of Christ\'s return against scoffers. Chapter 3 promises the earth\'s destruction and a new creation.',keyFacts:['Written shortly before Peter\'s martyrdom','"Add to your faith virtue; to virtue knowledge..." (1:5–7) — the ladder of virtues','Warns that false teachers will deny the Lord and exploit believers','"With the Lord a day is like a thousand years" (3:8)','References Paul\'s letters as "scripture" (3:16) — early canon affirmation'],characters:[{name:'Peter',desc:'The apostle, writing as an eyewitness of the Transfiguration and a man facing death.'},{name:'False Teachers',desc:'Unnamed scoffers who deny Christ\'s return and live immorally, exploiting the church.'},{name:'Paul',desc:'Referenced as a fellow apostle whose letters are being twisted by false teachers.'}],crossrefs:[{text:'Peter references the Transfiguration (1:16–18) — also recorded in Matthew 17, Mark 9, and Luke 9.'},{text:'II Peter 3:10 — "day of the Lord" — echoes Malachi 4 and connects to Revelation\'s final judgment.'},{text:'Peter\'s endorsement of Paul\'s letters (3:16) is a key piece of early New Testament canonical history.'}],verses:[{ref:'II Peter 1:5–7',text:'Add to your faith goodness; and to goodness, knowledge; and to knowledge, self-control; and to self-control, perseverance; and to perseverance, godliness; and to godliness, mutual affection; and to mutual affection, love.'},{ref:'II Peter 3:8–9',text:'With the Lord a day is like a thousand years, and a thousand years are like a day. The Lord is not slow in keeping his promise... He is patient with you, not wanting anyone to perish.'},{ref:'II Peter 3:18',text:'But grow in the grace and knowledge of our Lord and Savior Jesus Christ. To him be glory both now and to the day of eternity!'}]},
  {id:'jude',name:'Jude',testament:'New Testament · General Epistle',author:'Jude, brother of Jesus',chapters:1,era:'Apostolic Period · c. AD 65–80',timelineContext:'Jude, a half-brother of Jesus who initially did not believe in Him, writes urgently to warn believers about false teachers who have secretly crept into the church.',summary:'A short, fierce letter urging believers to "contend earnestly for the faith." Uses dramatic OT examples to illustrate God\'s judgment on apostasy. References the apocryphal Book of Enoch. Ends with one of Scripture\'s most beautiful doxologies.',keyFacts:['Author is Jude, half-brother of Jesus and brother of James','Only 1 chapter — 25 verses','"Contend earnestly for the faith once delivered to the saints" (v. 3)','References the Book of Enoch (v. 14) and the Assumption of Moses (v. 9)','Uses five OT judgment examples: fallen angels, Sodom, Cain, Balaam, Korah'],characters:[{name:'Jude',desc:'Half-brother of Jesus. Calls himself a "servant" rather than a brother — a mark of humility.'},{name:'Michael the Archangel',desc:'Referenced as disputing with the devil over Moses\' body (from the Assumption of Moses).'},{name:'The Apostates',desc:'False teachers who have crept in, turning grace into immorality and denying Christ.'}],crossrefs:[{text:'Jude 3–4 and 8–19 closely parallels II Peter 2 — scholars debate which came first.'},{text:'The doxology in Jude 24–25 is one of the most beloved in all of Christian worship and liturgy.'},{text:'Jude\'s quotation of Enoch (v. 14) is the only NT citation from a non-canonical Jewish text.'}],verses:[{ref:'Jude 3',text:'Dear friends, although I was very eager to write to you about the salvation we share, I felt compelled to write and urge you to contend for the faith that was once for all entrusted to God\'s holy people.'},{ref:'Jude 20–21',text:'But you, dear friends, by building yourselves up in your most holy faith and praying in the Holy Spirit, keep yourselves in God\'s love as you wait for the mercy of our Lord Jesus Christ.'},{ref:'Jude 24–25',text:'To him who is able to keep you from stumbling and to present you before his glorious presence without fault and with great joy — to the only God our Savior be glory, majesty, power and authority, through Jesus Christ our Lord.'}]}
];

const FLASHCARDS=[];
BOOKS.forEach(b=>{
  FLASHCARDS.push({q:'Who wrote '+b.name+'?',a:b.author,book:b.name});
  FLASHCARDS.push({q:'What era does '+b.name+' come from?',a:b.era,book:b.name});
  b.keyFacts.slice(0,2).forEach(f=>{const p=f.split('—');if(p.length>1)FLASHCARDS.push({q:'Complete: "'+p[0].trim()+' — ___"',a:p[1].trim(),book:b.name});});
  FLASHCARDS.push({q:'What book contains: "'+b.verses[0].text.substring(0,55)+'..."',a:b.verses[0].ref,book:b.name});
});

  {q:'What is the exact phrase about money in I Timothy 6:10?',a:'"The love of money is a root of all kinds of evil"',opts:['"The love of money is a root of all kinds of evil"','"Money is the root of all evil"','"Riches are a snare to the soul"','"Gain is not godliness"'],cat:'Content',book:'I Timothy',exp:'It is "the LOVE of money" — not money itself — and "A root" not "THE root."'},

  {q:'How many chapters does Jude have?',a:'1 chapter',opts:['1 chapter','3 chapters','5 chapters','25 chapters'],cat:'Content',book:'Jude',exp:'Jude has only 1 chapter — 25 verses.'},

  {q:'Where was Timothy pastoring when Paul wrote I Timothy?',a:'Ephesus',opts:['Ephesus','Corinth','Antioch','Philippi'],cat:'Content',book:'I Timothy',exp:'Paul left Timothy in Ephesus to address false doctrine and organize the church.'},

// STATE
let view='study',openCard=null,cardTab={};
let bookStatus={},xp=0;
let fcDeck=[],fcIdx=0,fcKnow=0,fcLearn=0,fcFlipped=false;
let gameMode=null,gameQs=[],gameIdx=0,gameScore=0;
let gameAnswered=false,gameSel=null;
let timerInt=null,timerLeft=10;
let detectClueIdx=0;

try{const s=JSON.parse(localStorage.getItem('bb3')||'{}');bookStatus=s.bs||{};xp=s.xp||0;}catch(e){}
function save(){try{localStorage.setItem('bb3',JSON.stringify({bs:bookStatus,xp}));}catch(e){}}
function addXP(n){xp+=n;save();refreshXP();}
function refreshXP(){
  const lvl=Math.floor(xp/100)+1,pct=xp%100;
  document.getElementById('xpNum').textContent=xp+' XP';
  document.getElementById('xpLvl').textContent='Level '+lvl;
  document.getElementById('xpFill').style.width=pct+'%';
}

function showView(v){
  view=v;clearTimer();
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent.toLowerCase().trim().startsWith(v.substring(0,4)));
  });
  render();
}

function render(){
  const app=document.getElementById('app');
  if(view==='study') app.innerHTML=buildStudy();
  else if(view==='flashcards') app.innerHTML=buildFlashcards();
  else if(view==='games') app.innerHTML=buildGames();
  else if(view==='progress') app.innerHTML=buildProgress();
  refreshXP();
}

// STUDY
function buildStudy(){
  const total=BOOKS.length,done=BOOKS.filter(b=>bookStatus[b.id]).length;
  const conf=BOOKS.filter(b=>bookStatus[b.id]==='confident').length;
  const rev=BOOKS.filter(b=>bookStatus[b.id]==='review').length;
  return `<div class="study-stats fade-up">
    <div class="stat-card"><div class="stat-num">${done}/${total}</div><div class="stat-label">Opened</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${conf}</div><div class="stat-label">Confident</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#E08C55">${rev}</div><div class="stat-label">Need Review</div></div>
  </div>
  <div class="books-list">${BOOKS.map(b=>buildBookRow(b)).join('')}</div>`;
}

function buildBookRow(b){
  const open=openCard===b.id,st=bookStatus[b.id]||'',tab=cardTab[b.id]||'overview';
  const sLabels={'':'Mark','studied':'Studied','confident':'Confident','review':'Review'};
  return `<div class="book-row ${open?'open':''}" id="brow-${b.id}">
    <div class="book-row-header" onclick="toggleBook('${b.id}')">
      <div class="book-row-left">
        <div class="book-status-dot ${st}"></div>
        <div>
          <div class="book-row-name">${b.name}</div>
          <div class="book-row-meta">${b.testament} · ${b.chapters} ch.</div>
        </div>
      </div>
      <div class="book-row-right">
        <button class="status-btn ${st}" onclick="event.stopPropagation();cycleStatus('${b.id}')">${sLabels[st]}</button>
        <span class="book-chev">▾</span>
      </div>
    </div>
    ${open?`<div class="book-detail-wrap"><div class="book-detail-body">
      <div class="timeline-chip">📅 ${b.era}</div>
      <div class="detail-tabs">
        ${['overview','facts','characters','connections','verses'].map(t=>`<button class="dtab ${tab===t?'active':''}" onclick="setTab('${b.id}','${t}')">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}
      </div>
      ${tab==='overview'?`<div class="dpanel active">
        <div class="dlabel">Author</div><div class="dtext" style="margin-bottom:.8rem;font-weight:600;color:var(--gold-light)">${b.author}</div>
        <div class="dlabel">Historical Context</div><div class="dtext" style="margin-bottom:.8rem">${b.timelineContext}</div>
        <div class="dlabel">Summary</div><div class="dtext">${b.summary}</div>
      </div>`:tab==='facts'?`<div class="dpanel active">
        <div class="dlabel">Key Facts</div>
        <div class="facts-list">${b.keyFacts.map(f=>`<div class="fact-item">${f}</div>`).join('')}</div>
      </div>`:tab==='characters'?`<div class="dpanel active">
        <div class="dlabel">Key Characters</div>
        <div class="chars-grid">${b.characters.map(c=>`<div class="char-item"><div class="char-name">${c.name}</div><div class="char-desc">${c.desc}</div></div>`).join('')}</div>
      </div>`:tab==='connections'?`<div class="dpanel active">
        <div class="dlabel">Cross-References & Connections</div>
        <div class="crossrefs-list">${b.crossrefs.map(r=>`<div class="xref-item">${r.text}${r.link?' <strong>'+r.link+'</strong>':''}</div>`).join('')}</div>
      </div>`:tab==='verses'?`<div class="dpanel active">
        <div class="dlabel">Verse Spotlight</div>
        <div class="verses-list">${b.verses.map(v=>`<div class="verse-item"><div class="verse-ref">${v.ref}</div><div class="verse-text">${v.text}</div></div>`).join('')}</div>
      </div>`:''}
    </div></div>`:''}
  </div>`;
}

function toggleBook(id){
  openCard=openCard===id?null:id;
  if(!cardTab[id])cardTab[id]='overview';
  render();
  if(openCard)setTimeout(()=>{const el=document.getElementById('brow-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
}
function setTab(id,t){cardTab[id]=t;render();}
function cycleStatus(id){
  const cycle=['','studied','confident','review'];
  const cur=cycle.indexOf(bookStatus[id]||'');
  bookStatus[id]=cycle[(cur+1)%cycle.length];
  if(bookStatus[id]==='confident')addXP(10);
  else if(bookStatus[id]==='studied')addXP(5);
  save();render();
}

// FLASHCARDS
function startFC(){fcDeck=[...FLASHCARDS].sort(()=>Math.random()-.5);fcIdx=0;fcKnow=0;fcLearn=0;fcFlipped=false;render();}
function buildFlashcards(){
  if(!fcDeck.length)return `<div class="start-screen fade-up"><p class="sec-head">Flashcards</p><p class="start-label">${FLASHCARDS.length} cards covering all 11 books — authors, eras, key facts, and verse references.</p><button class="start-btn" onclick="startFC()">Start Flashcards</button></div>`;
  if(fcIdx>=fcDeck.length){
    const pct=Math.round(fcKnow/fcDeck.length*100);
    const msg=pct>=80?'Outstanding! You\'re ready for competition.':pct>=60?'Good progress. Review the ones you marked.':'Keep going — repetition builds confidence.';
    return `<div class="fc-shell fade-up"><div class="fc-done-card"><div class="fc-done-score">${fcKnow}/${fcDeck.length}</div><div class="fc-done-label">${pct}% known</div><div class="fc-done-msg">${msg}</div></div><div class="fc-btns" style="width:100%;max-width:360px"><button class="fc-action know" onclick="startFC()">Restart</button><button class="fc-action skip" onclick="fcDeck=[];render()">Exit</button></div></div>`;
  }
  const card=fcDeck[fcIdx],pct=(fcIdx/fcDeck.length)*100;
  return `<div class="fc-shell fade-up">
    <div class="fc-topbar" style="width:100%">
      <span class="fc-counter">${fcIdx+1} of ${fcDeck.length}</span>
      <div class="fc-scores"><span class="fc-know">✓ ${fcKnow}</span><span class="fc-learn">✗ ${fcLearn}</span></div>
    </div>
    <div class="fc-prog-bar" style="width:100%"><div class="fc-prog-fill" style="width:${pct}%"></div></div>
    <div class="fc-scene" onclick="flipFC()">
      <div class="fc-card ${fcFlipped?'flipped':''}">
        <div class="fc-face fc-front">
          <div class="fc-face-label">${card.book}</div>
          <div class="fc-q">${card.q}</div>
          <div class="fc-tap-hint">Tap to reveal</div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-face-label">Answer</div>
          <div class="fc-a">${card.a}</div>
        </div>
      </div>
    </div>
    ${fcFlipped?`<div class="fc-btns" style="width:100%;max-width:420px"><button class="fc-action know" onclick="fcAns(true)">✓ Know it</button><button class="fc-action learn" onclick="fcAns(false)">✗ Still learning</button><button class="fc-action skip" onclick="fcAns(null)">Skip</button></div>`:`<div style="height:46px"></div>`}
  </div>`;
}
function flipFC(){fcFlipped=!fcFlipped;render();}
function fcAns(knew){if(knew===true){fcKnow++;addXP(3);}else if(knew===false)fcLearn++;fcIdx++;fcFlipped=false;render();}

// GAMES
function buildGames(){
  if(!gameMode)return buildGamePicker();
  if(gameMode==='speed')return buildSpeed();
  if(gameMode==='tf')return buildTF();
  if(gameMode==='detective')return buildDetective();
  return '';
}
function buildGamePicker(){return `<p class="sec-head">Choose a Game</p><div class="games-grid fade-up"><div class="game-card" onclick="startSpeed()"><div class="game-icon">⚡</div><div class="game-title">Speed Round</div><div class="game-desc">10 questions · 10 seconds each · Race the clock</div></div><div class="game-card" onclick="startTF()"><div class="game-icon">⚖️</div><div class="game-title">True or False</div><div class="game-desc">Rapid-fire true/false across all 11 books</div></div><div class="game-card" onclick="startDetective()"><div class="game-icon">🔍</div><div class="game-title">Book Detective</div><div class="game-desc">Three clues · One book · Can you name it?</div></div></div>`;}

function startSpeed(){clearTimer();gameMode='speed';gameQs=[...ALL_Q].sort(()=>Math.random()-.5).slice(0,10);gameIdx=0;gameScore=0;gameAnswered=false;gameSel=null;render();startTimer(10);}
function buildSpeed(){
  if(gameIdx>=gameQs.length)return buildResults('speed');
  const q=gameQs[gameIdx],pct=(timerLeft/10)*100,danger=timerLeft<=3;
  return `<div class="quiz-shell fade-up"><div class="back-row"><button class="back-btn" onclick="endGame()">← Back</button></div>
    <div class="quiz-topbar"><span class="badge">⚡ Speed</span><span class="badge">${gameScore}/${gameIdx}</span><span class="badge">Q${gameIdx+1}/10</span><span class="badge timer ${danger?'danger':''}">⏱ ${timerLeft}s</span></div>
    <div class="timer-track"><div class="timer-fill ${danger?'danger':''}" style="width:${pct}%"></div></div>
    <div class="q-card"><div class="q-badge">${q.cat} · ${q.book}</div><div class="q-text">${q.q}</div>
      <div class="opts">${q.opts.map((o,i)=>`<button class="opt ${gameAnswered?(o===q.a?'correct':o===gameSel?'wrong':''):''}" onclick="${gameAnswered?'':'speedAns('+i+')'}" ${gameAnswered?'disabled':''}>${o}</button>`).join('')}</div>
      ${gameAnswered?`<div class="feedback ${gameSel===q.a?'ok':'no'}">${gameSel===q.a?'✓ Correct! ':'✗ '+q.a+'. '}${q.exp}</div><button class="next-btn" onclick="speedNext()">${gameIdx+1<gameQs.length?'Next →':'See Results'}</button>`:''}
    </div></div>`;
}
function speedAns(i){clearTimer();gameAnswered=true;gameSel=gameQs[gameIdx].opts[i];if(gameSel===gameQs[gameIdx].a){gameScore++;addXP(5);}render();}
function speedNext(){gameIdx++;gameAnswered=false;gameSel=null;if(gameIdx<gameQs.length){render();startTimer(10);}else render();}

function startTF(){clearTimer();gameMode='tf';gameQs=[...TF_Q].sort(()=>Math.random()-.5);gameIdx=0;gameScore=0;gameAnswered=false;gameSel=null;render();}
function buildTF(){
  if(gameIdx>=gameQs.length)return buildResults('tf');
  const q=gameQs[gameIdx];
  return `<div class="quiz-shell fade-up"><div class="back-row"><button class="back-btn" onclick="endGame()">← Back</button></div>
    <div class="quiz-topbar"><span class="badge">⚖️ True or False</span><span class="badge">${gameScore}/${gameIdx}</span><span class="badge">Q${gameIdx+1}/${gameQs.length}</span></div>
    <div class="q-card"><div class="q-badge">${q.book}</div><div class="q-text">${q.q}</div>
      <div class="tf-row">
        <button class="tf-btn ${gameAnswered?(q.a===true?'correct':gameSel===true?'wrong':''):''}" onclick="${gameAnswered?'':'tfAns(true)'}" ${gameAnswered?'disabled':''}>TRUE</button>
        <button class="tf-btn ${gameAnswered?(q.a===false?'correct':gameSel===false?'wrong':''):''}" onclick="${gameAnswered?'':'tfAns(false)'}" ${gameAnswered?'disabled':''}>FALSE</button>
      </div>
      ${gameAnswered?`<div class="feedback ${gameSel===q.a?'ok':'no'}">${gameSel===q.a?'✓ Correct! ':'✗ '+String(q.a).toUpperCase()+'. '}${q.exp}</div><button class="next-btn" onclick="tfNext()">${gameIdx+1<gameQs.length?'Next →':'See Results'}</button>`:''}
    </div></div>`;
}
function tfAns(v){gameAnswered=true;gameSel=v;if(v===gameQs[gameIdx].a){gameScore++;addXP(4);}render();}
function tfNext(){gameIdx++;gameAnswered=false;gameSel=null;render();}

function startDetective(){clearTimer();gameMode='detective';gameQs=[...DETECTIVE].sort(()=>Math.random()-.5);gameIdx=0;gameScore=0;gameAnswered=false;gameSel=null;detectClueIdx=0;render();}
function buildDetective(){
  if(gameIdx>=gameQs.length)return buildResults('detective');
  const c=gameQs[gameIdx],bNames=BOOKS.map(b=>b.name);
  return `<div class="quiz-shell fade-up"><div class="back-row"><button class="back-btn" onclick="endGame()">← Back</button></div>
    <div class="quiz-topbar"><span class="badge">🔍 Detective</span><span class="badge">${gameScore}/${gameIdx}</span><span class="badge">Case ${gameIdx+1}/${gameQs.length}</span></div>
    <div class="q-card"><div class="q-badge">Clues: ${detectClueIdx+1}/3</div><div class="q-text">Which book am I?</div>
      <div class="clues-list">${c.clues.slice(0,detectClueIdx+1).map((cl,i)=>`<div class="clue-item"><span class="clue-num">Clue ${i+1}</span>${cl}</div>`).join('')}</div>
      ${!gameAnswered?`${detectClueIdx<2?`<button class="reveal-btn" onclick="detectClueIdx++;render()">Reveal Next Clue</button>`:''}
        <div class="opts">${bNames.map((n,i)=>`<button class="opt" onclick="detectAns(${i})">${n}</button>`).join('')}</div>`:`
        <div class="opts">${bNames.map(n=>`<button class="opt ${n===c.book?'correct':n===gameSel?'wrong':''}" disabled>${n}</button>`).join('')}</div>
        <div class="feedback ${gameSel===c.book?'ok':'no'}">${gameSel===c.book?'✓ Correct! Spotted with '+(detectClueIdx+1)+' clue(s).':'✗ It was '+c.book+'. Review the clues.'}</div>
        <button class="next-btn" onclick="detectNext()">${gameIdx+1<gameQs.length?'Next Case →':'See Results'}</button>`}
    </div></div>`;
}
function detectAns(i){gameSel=BOOKS[i].name;gameAnswered=true;if(gameSel===gameQs[gameIdx].book){const pts=detectClueIdx===0?15:detectClueIdx===1?10:7;addXP(pts);gameScore++;}render();}
function detectNext(){gameIdx++;gameAnswered=false;gameSel=null;detectClueIdx=0;render();}

function buildResults(mode){
  const total=gameQs.length,pct=Math.round(gameScore/total*100);
  const names={speed:'Speed Round',tf:'True or False',detective:'Book Detective'};
  const msg=pct===100?'Perfect score! Ready for competition.':pct>=80?'Excellent — nearly flawless.':pct>=60?'Solid. A few more sessions and you\'ll own it.':'Keep going — every rep builds the foundation.';
  return `<div class="results"><div style="font-family:Cinzel,serif;font-size:.62rem;letter-spacing:.2em;color:var(--gold);opacity:.6;margin-bottom:.4rem">${names[mode]}</div>
    <div class="result-score">${gameScore}/${total}</div>
    <div class="result-label">${pct}% Correct</div>
    <div class="result-xp">+${gameScore*(mode==='speed'?5:mode==='tf'?4:10)} XP</div>
    <div class="result-msg">${msg}</div>
    <div class="result-actions">
      <button class="result-btn primary" onclick="${mode==='speed'?'startSpeed()':mode==='tf'?'startTF()':'startDetective()'}">Play Again</button>
      <button class="result-btn" onclick="endGame()">Other Games</button>
      <button class="result-btn" onclick="showView('study')">Study</button>
    </div></div>`;
}
function endGame(){clearTimer();gameMode=null;gameQs=[];render();}

function startTimer(s){
  clearTimer();timerLeft=s;render();
  timerInt=setInterval(()=>{
    timerLeft--;
    const fill=document.querySelector('.timer-fill'),badge=document.querySelector('.badge.timer');
    if(fill){fill.style.width=(timerLeft/s*100)+'%';if(timerLeft<=3)fill.classList.add('danger');}
    if(badge){badge.textContent='⏱ '+timerLeft+'s';if(timerLeft<=3)badge.classList.add('danger');}
    if(timerLeft<=0){clearTimer();gameAnswered=true;gameSel=null;render();}
  },1000);
}
function clearTimer(){if(timerInt){clearInterval(timerInt);timerInt=null;}}

// PROGRESS
function buildProgress(){
  const conf=BOOKS.filter(b=>bookStatus[b.id]==='confident').length;
  const studied=BOOKS.filter(b=>bookStatus[b.id]==='studied').length;
  const rev=BOOKS.filter(b=>bookStatus[b.id]==='review').length;
  const total=BOOKS.length,pct=Math.round(conf/total*100);
  const r=52,circ=2*Math.PI*r,offset=circ-(conf/total)*circ;
  const lvl=Math.floor(xp/100)+1;
  const sLabels={'':'Not started','studied':'Studied','confident':'Confident','review':'Needs review'};
  return `<div class="fade-up">
    <div class="prog-hero">
      <svg width="125" height="125" viewBox="0 0 125 125">
        <circle class="ring-bg-c" cx="62.5" cy="62.5" r="${r}"/>
        <circle class="ring-fg-c" cx="62.5" cy="62.5" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        <text class="ring-txt" x="62.5" y="58" font-size="17">${pct}%</text>
        <text class="ring-sub-txt" x="62.5" y="75" font-size="10">confident</text>
      </svg>
      <div class="prog-hero-stats">
        <div class="prog-hero-row"><span class="prog-hero-label">Level</span><span class="prog-hero-val gold">Lv ${lvl} · ${xp} XP</span></div>
        <div class="prog-hero-row"><span class="prog-hero-label">Confident</span><span class="prog-hero-val green">${conf}/${total}</span></div>
        <div class="prog-hero-row"><span class="prog-hero-label">Studied</span><span class="prog-hero-val gold">${studied}/${total}</span></div>
        <div class="prog-hero-row"><span class="prog-hero-label">Need Review</span><span class="prog-hero-val orange">${rev}/${total}</span></div>
      </div>
    </div>
    <div class="prog-books-list">
      ${BOOKS.map(b=>{const s=bookStatus[b.id]||'';return `<div class="prog-book-row"><div class="prog-dot ${s}"></div><div class="prog-book-name">${b.name}</div><div class="prog-book-status ${s}">${sLabels[s]}</div><button class="prog-cycle-btn" onclick="cycleStatus('${b.id}')">›</button></div>`;}).join('')}
    </div>
    <button class="reset-btn" onclick="if(confirm('Reset all progress and XP?')){bookStatus={};xp=0;save();render()}">Reset Progress</button>
  </div>`;
}

render();
</script>
</body>
</html>
